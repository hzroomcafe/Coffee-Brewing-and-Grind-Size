<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>咖啡廳推薦 · 咖啡小村</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F2EDE3; --card: #FBF8F1; --ink: #3A3733; --ink-soft: #6B6660; --muted: #9A9189;
  --line: #E4DCCC; --sage: #7E8D85; --sage-d: #6E7D75; --accent: #B5654A; --chip: #ECE4D6;
}
html.dark {
  --cream: #1B1E22; --card: #262A2E; --ink: #EDE8DD; --ink-soft: #B8B2A7; --muted: #8A857C;
  --line: #393E43; --sage: #8B9A91; --sage-d: #7E8D85; --accent: #C9785C; --chip: #33383D;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; font-feature-settings: "palt"; }
body { background: var(--cream); color: var(--ink); transition: background .3s, color .3s; min-height: 100vh; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
.wrap { max-width: 720px; margin: 0 auto; padding: 0 16px; }

/* paper grain */
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:1;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.23 0 0 0 0 0.21 0 0 0 0 0.18 0 0 0 0.55 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.07; mix-blend-mode:multiply; }
html.dark body::before { opacity:.16; mix-blend-mode:overlay; }
.modal-backdrop { position:fixed; inset:0; z-index:90; background:rgba(0,0,0,.45); display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(3px); }
@media(min-width:600px){ .modal-backdrop { align-items:center; } }
.modal { background:var(--card); border-radius:22px 22px 0 0; padding:22px 20px 32px; width:100%; max-width:520px; box-shadow:0 -16px 40px rgba(0,0,0,.18); }
@media(min-width:600px){ .modal { border-radius:22px; padding:24px; } }
.modal h3 { font-size:17px; font-weight:900; margin-bottom:4px; }
.modal .sub { font-size:12.5px; color:var(--muted); margin-bottom:16px; line-height:1.5; }
.modal select, .modal textarea { width:100%; padding:11px 13px; border-radius:12px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-size:14px; font-family:inherit; outline:none; }
.modal select { margin-bottom:11px; }
.modal textarea { resize:vertical; min-height:80px; line-height:1.6; }
.modal-btns { display:flex; gap:9px; margin-top:13px; }
.modal-btns button { flex:1; padding:13px; border-radius:13px; font-size:14px; font-weight:800; border:0; cursor:pointer; font-family:inherit; transition:.15s; }
.modal-cancel { background:var(--chip); color:var(--ink-soft); }
.modal-submit { background:var(--sage); color:#fff; }
.modal-submit:hover { filter:brightness(1.08); }
.report-btn { background:none; border:1px solid var(--line); border-radius:9px; padding:5px 9px; font-size:11.5px; font-weight:700; color:var(--muted); cursor:pointer; display:inline-flex; align-items:center; gap:4px; transition:.15s; }
.report-btn:hover { border-color:var(--accent); color:var(--accent); }
.report-btn svg { width:13px; height:13px; }
/* 圖片縮圖 */
.cafe-photo { width:66px; height:66px; border-radius:12px; object-fit:cover; flex-shrink:0; cursor:pointer; border:1px solid var(--line); }
.photo-lb { position:fixed; inset:0; z-index:99; background:rgba(0,0,0,.88); display:flex; align-items:center; justify-content:center; cursor:zoom-out; }
.photo-lb img { max-width:92vw; max-height:88vh; border-radius:16px; }

/* header */
header { padding: 26px 0 14px; }
.topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.brand { display:flex; align-items:center; gap:11px; }
.brand .logo { width:42px; height:42px; border-radius:13px; background:var(--sage); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(126,141,133,.32); flex-shrink:0; }
.brand .logo svg { width:25px; height:25px; }
.brand h1 { font-size:19px; font-weight:900; letter-spacing:-.01em; line-height:1.1; }
.brand p { font-size:11.5px; color:var(--muted); font-weight:600; margin-top:2px; }
.iconbtn { width:40px; height:40px; border-radius:12px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.15s; flex-shrink:0; }
.iconbtn:hover { color:var(--ink); border-color:var(--sage); }
.iconbtn svg { width:19px; height:19px; }
.backlink { display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--muted); text-decoration:none; margin-bottom:14px; transition:.15s; }
.backlink:hover { color:var(--sage); }
.backlink svg { width:15px; height:15px; }

/* controls */
.controls { margin-top:16px; display:flex; flex-direction:column; gap:11px; }
.searchrow { display:flex; gap:9px; }
.search { flex:1; position:relative; }
.search svg { position:absolute; left:13px; top:50%; transform:translateY(-50%); width:17px; height:17px; color:var(--muted); pointer-events:none; }
.search input { width:100%; padding:12px 13px 12px 38px; border-radius:13px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-size:14px; outline:none; transition:.15s; }
.search input:focus { border-color:var(--sage); }
.search input::placeholder { color:var(--muted); }
.locbtn { display:flex; align-items:center; gap:7px; padding:0 15px; border-radius:13px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; transition:.15s; }
.locbtn:hover { border-color:var(--sage); color:var(--ink); }
.locbtn.on { background:var(--sage); color:#fff; border-color:var(--sage); }
.locbtn svg { width:16px; height:16px; }
.locbtn.loading svg { animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* tag chips */
.tags { display:flex; gap:7px; overflow-x:auto; padding-bottom:3px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.tags::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:7px 13px; border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); font-size:12.5px; font-weight:700; cursor:pointer; transition:.15s; display:inline-flex; align-items:center; gap:5px; }
.chip:hover { border-color:var(--sage); }
.chip.on { background:var(--sage); color:#fff; border-color:var(--sage); }
.chip .dot { font-size:13px; }

/* view toggle + count */
.subrow { display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
.count { font-size:12.5px; color:var(--muted); font-weight:600; }
.count b { color:var(--ink); font-weight:800; }
.vtoggle { display:flex; gap:3px; background:var(--chip); padding:3px; border-radius:11px; }
.vtoggle button { border:0; background:transparent; font:inherit; font-size:12.5px; font-weight:800; color:var(--muted); padding:6px 13px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:.15s; }
.vtoggle button svg { width:14px; height:14px; }
.vtoggle button.on { background:var(--card); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.1); }

/* map */
#map { height:420px; border-radius:18px; margin-top:16px; border:1px solid var(--line); z-index:2; }
.leaflet-popup-content-wrapper { border-radius:16px; box-shadow:0 8px 28px rgba(0,0,0,.18); padding:0; overflow:hidden; }
.leaflet-popup-content { margin:0; font-family:'Noto Sans TC',sans-serif; }
.cafe-popup .leaflet-popup-content-wrapper { border:none; }
.popup-card { padding:14px 15px 12px; min-width:200px; max-width:240px; }
.popup-photo { width:100%; height:100px; object-fit:cover; border-radius:10px; margin-bottom:10px; display:block; }
.popup-name { font-size:15px; font-weight:900; color:#3A3733; letter-spacing:-.01em; }
.popup-area { font-size:11.5px; color:#9A9189; margin-top:3px; display:flex; align-items:center; gap:4px; }
.popup-area svg { color:#7E8D85; }
.popup-reason { font-size:12px; color:#6B6660; margin-top:8px; line-height:1.6; }
.popup-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
.popup-tag { font-size:11px; font-weight:700; padding:3px 8px; border-radius:999px; background:color-mix(in srgb,#7E8D85 14%,transparent); color:#5a7068; }
.popup-actions { display:flex; gap:6px; margin-top:10px; }
.popup-btn { display:inline-flex; align-items:center; gap:5px; padding:7px 12px; border-radius:10px; background:#f0ece4; color:#3A3733; font-size:12px; font-weight:700; text-decoration:none; flex:1; justify-content:center; }
.popup-btn.primary { background:#7E8D85; color:#fff; }

/* region chips — 比標籤略強調 */
.regionbar { display:flex; gap:7px; overflow-x:auto; padding-bottom:3px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.regionbar::-webkit-scrollbar { display:none; }
.rchip { flex-shrink:0; padding:8px 14px; border-radius:11px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); font-size:13px; font-weight:800; cursor:pointer; transition:.15s; display:inline-flex; align-items:center; gap:6px; }
.rchip svg { width:14px; height:14px; }
.rchip:hover { border-color:var(--sage); }
.rchip.on { background:var(--ink); color:var(--cream); border-color:var(--ink); }
.rchip .ct { font-size:11px; opacity:.7; font-weight:700; }
/* region group header in list */
.rgroup { margin-top:6px; }
.rgroup:first-child { margin-top:0; }
.rhead { display:flex; align-items:center; gap:8px; padding:4px 2px 11px; }
.rhead svg { width:15px; height:15px; color:var(--sage); }
.rhead .nm { font-size:13.5px; font-weight:900; letter-spacing:.02em; }
.rhead .ct { font-size:11.5px; color:var(--muted); font-weight:700; }
.rhead .ln { flex:1; height:1px; background:var(--line); }
.rgroup .list-inner { display:flex; flex-direction:column; gap:13px; }

/* list */
.list { margin-top:16px; display:flex; flex-direction:column; gap:15px; }
.cafe { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:20px 20px 16px; transition:.18s; cursor:pointer; position:relative; overflow:hidden; }
.cafe::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--sage); opacity:0; transition:.18s; }
.cafe:hover { border-color:var(--sage); transform:translateY(-2px); box-shadow:0 10px 28px rgba(0,0,0,.08); }
.cafe:hover::before { opacity:1; }
.cafe-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.cafe-headmain { min-width:0; flex:1; }
.cafe-name { font-size:18px; font-weight:900; letter-spacing:-.01em; line-height:1.22; }
.cafe-area { display:flex; align-items:center; gap:5px; font-size:12.5px; color:var(--muted); font-weight:600; margin-top:5px; min-width:0; }
.cafe-area svg { width:13px; height:13px; flex-shrink:0; color:var(--sage); }
.cafe-area span { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.region-badge { flex-shrink:0; font-size:11px; font-weight:800; color:var(--sage-d); background:color-mix(in srgb,var(--sage) 16%,transparent); border-radius:999px; padding:5px 11px; white-space:nowrap; }
.dist { flex-shrink:0; text-align:center; background:color-mix(in srgb,var(--sage) 14%,transparent); border-radius:12px; padding:6px 10px; }
.dist .n { font-size:15px; font-weight:900; color:var(--sage-d); line-height:1.05; }
.dist .u { font-size:9.5px; color:var(--sage-d); font-weight:700; opacity:.8; }
.reason-wrap { margin-top:14px; padding-left:14px; position:relative; }
.reason-wrap::before { content:'“'; position:absolute; left:-2px; top:-6px; font-family:Georgia,serif; font-size:30px; line-height:1; color:var(--sage); opacity:.4; }
.reason { font-size:14px; line-height:1.85; color:var(--ink-soft); text-wrap:pretty; }
.cafe-tags { display:flex; flex-wrap:wrap; gap:7px; margin-top:14px; }
.tg { font-size:11.5px; font-weight:700; padding:5px 11px; border-radius:999px; background:color-mix(in srgb,var(--sage) 10%,transparent); color:var(--sage-d); border:1px solid color-mix(in srgb,var(--sage) 22%,transparent); display:inline-flex; align-items:center; gap:4px; }
.cafe-foot { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:16px; padding-top:13px; border-top:1px solid var(--line); }
.byline { font-size:12px; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:7px; min-width:0; }
.byline b { color:var(--ink); font-weight:800; }
.byline .av { width:26px; height:26px; border-radius:50%; background:var(--sage); color:#fff; font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.foot-actions { display:flex; gap:7px; flex-shrink:0; }
.act { display:inline-flex; align-items:center; gap:5px; padding:8px 13px; border-radius:11px; font-size:12.5px; font-weight:800; cursor:pointer; border:1px solid var(--line); background:transparent; color:var(--ink-soft); text-decoration:none; transition:.15s; }
.act:hover { border-color:var(--sage); color:var(--ink); }
.act.primary { background:var(--sage); color:#fff; border-color:var(--sage); }
.act.primary:hover { background:var(--sage-d); color:#fff; }
.act svg { width:15px; height:15px; }

/* empty / loading */
.empty { text-align:center; padding:56px 20px; color:var(--muted); }
.empty svg { width:46px; height:46px; opacity:.5; margin-bottom:14px; }
.empty p { font-size:14px; font-weight:600; }
.empty .sm { font-size:12.5px; margin-top:6px; opacity:.8; }
.skeleton { height:140px; border-radius:18px; background:linear-gradient(90deg,var(--card) 25%,var(--chip) 50%,var(--card) 75%); background-size:200% 100%; animation:sk 1.4s infinite; }
@keyframes sk { to { background-position:-200% 0; } }

.hidden { display:none !important; }
footer { text-align:center; padding:30px 0 40px; color:var(--muted); font-size:11.5px; }
footer a { color:var(--sage); text-decoration:none; font-weight:700; }

/* banner for sheet config */
.banner { margin-top:14px; padding:12px 15px; border-radius:13px; background:var(--chip); border:1px solid var(--line); font-size:12px; color:var(--ink-soft); line-height:1.6; }
.banner b { color:var(--ink); }
</style>
</head>
<body>
<div class="app wrap">
  <header>
    <a class="backlink" href="Coffee Tools v5.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      返回工具箱
    </a>
    <div class="topbar">
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
        </div>
        <div>
          <h1>咖啡廳推薦</h1>
          <p>大家私藏的好店清單</p>
        </div>
      </div>
      <div style="display:flex; gap:9px;">
        <a class="iconbtn" href="Cafe Submit.html" title="推薦一間咖啡廳" style="text-decoration:none; width:auto; padding:0 14px; gap:6px; font-size:13px; font-weight:800; color:#fff; background:var(--sage); border-color:var(--sage);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>推薦
        </a>
        <button class="iconbtn" id="themeBtn" title="切換深色/淺色">

    <div class="controls">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" type="text" placeholder="搜尋店名、區域、推薦人…" />
        </div>
        <button class="locbtn" id="locBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="locLabel">附近</span>
        </button>
      </div>
      <div class="tags" id="regionBar"></div>
      <div class="tags" id="tagBar"></div>
      <div class="subrow">
        <div class="count" id="count"></div>
        <div class="vtoggle">
          <button id="vList" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>列表</button>
          <button id="vMap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l-6 3V6l6-3 6 3 6-3v15l-6 3-6-3z"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>地圖</button>
        </div>
      </div>
    </div>
  </header>

  <div id="banner" class="banner hidden"></div>
  <div id="map" class="hidden"></div>
  <div class="list" id="list"></div>
  <footer>

  </footer>

<script>
/* ===========================================================
   設定區 — 之後接 Google Sheet 只要改這裡
   =========================================================== */
const CONFIG = {
  // 接 Google Sheet：把整個試算表設成「知道連結的人可檢視」，
  // 然後把這裡換成你的 Sheet ID（網址 /d/ 後面那段）；留空則用下方範例資料。
  SHEET_ID: '1XachRqnXwZ3oaCHv27vjLZ3uwkBKxMMdkDz3ySElhnM',
  SHEET_NAME: '咖啡廳',   // 工作表分頁名稱
  // 審核：只顯示「狀態」欄為已通過的店家（防止未審核投稿直接公開）。
  // 視為已通過的值：已通過 / 通過 / 公開 / approved / yes / true / 1（大小寫不拘）。
  // 若你的試算表沒有「狀態」這一欄（第 10 欄 J），所有列都會視為已通過。
  ONLY_APPROVED: true,
  // 回報錯誤送出導將審核：填入你的 Apps Script 網址（跟投稿表單同一支）
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycby3fOPs9RQplbpHfM8TwEfKhtg5e4JI3OR2tTIAk1Yfb2v8Yb8cAqr6sQ2uYttHHBh2/exec',
  REPORT_EMAIL: '',   // 留空即可，回報途徑由 Apps Script 處理
  // 預設地圖中心（台北車站），定位成功後會自動移到使用者位置
  DEFAULT_CENTER: [25.0478, 121.5170],
  DEFAULT_ZOOM: 12,
};

/* ===========================================================
   狀態
   =========================================================== */
let CAFES = [];
let activeTags = new Set();
let activeRegion = '';   // '' = 全部地區
let search = '';
let userPos = null;       // {lat,lng}
let view = 'list';        // list | map
let map = null, markers = [], tileLayer = null, userMarker = null;

/* ===========================================================
   工具函式
   =========================================================== */
function haversine(a, b) {
  const R = 6371, toR = d => d * Math.PI / 180;
  const dLat = toR(b.lat - a.lat), dLng = toR(b.lng - a.lng);
  const x = Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x)); // km
}
function fmtDist(km) {
  if (km < 1) return { n: Math.round(km*1000), u: '公尺' };
  return { n: km.toFixed(km < 10 ? 1 : 0), u: '公里' };
}
function mapsUrl(c) {
  if (c.link) return c.link;
  const q = encodeURIComponent(`${c.name} ${c.address || c.area || ''}`.trim());
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}
function navUrl(c) {
  if (c.lat && c.lng) return `https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}`;
  const q = encodeURIComponent(`${c.name} ${c.address || ''}`.trim());
  return `https://www.google.com/maps/dir/?api=1&destination=${q}`;
}
function initial(s){ return (s||'?').trim().charAt(0); }
function esc(s){ return (s||'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function tagIcon(k){ const t = TAGS.find(x=>x.key===k); return t ? t.icon : '·'; }
/* 地名正規化：臺↔台、全形空白、大小寫，讓「台北」也能搜到「臺北市」 */
function normTxt(s){
  return String(s||'')
    .replace(/臺/g,'台').replace(/灣/g,'湾')
    .replace(/[\u3000]/g,' ')
    .toLowerCase().replace(/\s+/g,'');
}
/* 從地址抓出城市詞（結尾為 市/縣/都/府/県/州/省） */
function cityFromAddr(addr){
  const toks = String(addr||'').split(/[\s,，、]+/).filter(Boolean);
  for(const t of toks){ if(/(市|縣|都|府|県|州|省)$/.test(t) && !/^(臺灣|台灣|台湾)$/.test(t)) return t; }
  return '';
}
/* 顯示用地點：有區域就用區域，否則用地址（去掉開頭國名） */
function displayLoc(c){
  if(c.area) return c.area;
  const a = String(c.address||'').replace(/^(臺灣|台灣|台湾|日本|大韓民國|韓國|大韩民国|中國|中国)\s*/,'').trim();
  return a || '—';
}
/* 地區 = 區域第一段；若區域空白，改用地址推算的城市（去掉市/縣等後綴、臺→台） */
function regionOf(c){
  let r = (String(c.area||'').split(/[·｜|、/]/)[0] || '').trim();
  if(!r){ r = cityFromAddr(c.address).replace(/(市|縣|都|府|県|州|省)$/,''); }
  r = r.replace(/臺/g,'台');
  return r || '其他';
}
function allRegions(){ const seen=[]; CAFES.forEach(c=>{ const r=regionOf(c); if(!seen.includes(r)) seen.push(r); }); return seen; }

/* ===========================================================
   資料載入：Google Sheet（gviz JSON）→ 失敗則用範例
   =========================================================== */
async function loadData() {
  if (!CONFIG.SHEET_ID) {
    CAFES = SAMPLE.slice();
    showBanner('目前顯示的是<b>範例資料</b>。要接上你自己的 Google Sheet（自己用或多人共筆都行），<a href="Cafe Setup Guide.html" style="color:var(--sage);font-weight:800;text-decoration:underline;">點此看圖解設定指南 →</a>');
    return;
  }
  try {
    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
    const txt = await (await fetch(url)).text();
    const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}')+1));
    const rows = json.table.rows || [];
    const cols = json.table.cols || [];
    // 以「標題列」名稱自動對應欄位（不管有沒有時間欄、順序如何都不會錯位）
    const norm = s => String(s||'').trim().toLowerCase();
    const findCol = (...names) => {
      for (let i = 0; i < cols.length; i++) {
        const lab = norm(cols[i] && cols[i].label);
        if (names.some(n => lab.includes(norm(n)))) return i;
      }
      return -1;
    };
    const IX = {
      name: findCol('店名','name'), area: findCol('區域','地區','area'),
      address: findCol('地址','address'), lat: findCol('緯度','lat'), lng: findCol('經度','lng','lon'),
      by: findCol('推薦人','by'), reason: findCol('推薦原因','原因','reason'),
      tags: findCol('標籤','tag'), link: findCol('連結','link','url'), status: findCol('狀態','status'), photo: findCol('圖片','photo','image'),
    };
    // 若拉不到標題（舊表無標題列），退回原本的固定欄位順序
      const FALLBACK = { name:0, area:1, address:2, lat:3, lng:4, by:5, reason:6, tags:7, link:8, status:9, photo:11 };
    const useHeader = IX.name >= 0;
    const M = useHeader ? IX : FALLBACK;
    const hasStatusCol = M.status >= 0 && M.status < cols.length;
    const APPROVED = ['已通過','通過','公開','approved','approve','yes','true','1','ok'];
    const isApproved = v => { const s = String(v||'').trim().toLowerCase(); return s === '' ? false : APPROVED.includes(s); };
    CAFES = rows.map(r => {
      const c = r.c || [];
      const g = i => (i >= 0 && c[i] && c[i].v != null) ? c[i].v : '';
      return {
        name: String(g(M.name)), area: String(g(M.area)), address: String(g(M.address)),
        lat: parseFloat(g(M.lat)) || null, lng: parseFloat(g(M.lng)) || null,
        by: String(g(M.by)), reason: String(g(M.reason)),
        tags: String(g(M.tags)).split(/[,，、\s]+/).filter(Boolean),
        link: String(g(M.link)),
        status: String(g(M.status)),
        photo: (() => { try { const v=g(M.photo); return JSON.parse(v)||v; } catch(e){ return g(M.photo)||''; } })(),
      };
    }).filter(c => c.name)
      .filter(c => !(CONFIG.ONLY_APPROVED && hasStatusCol) || isApproved(c.status));
    hideBanner();
  } catch (e) {
    CAFES = SAMPLE.slice();
    showBanner('讀取 Google Sheet 失敗，暫時顯示範例資料。請確認試算表已開放「知道連結的人可檢視」。');
  }
}
function showBanner(html){ const b=document.getElementById('banner'); b.innerHTML=html; b.classList.remove('hidden'); }
function hideBanner(){ document.getElementById('banner').classList.add('hidden'); }

/* ===========================================================
   篩選 + 排序
   =========================================================== */
function getFiltered() {
  let out = CAFES.filter(c => {
    if (activeRegion && regionOf(c) !== activeRegion) return false;
    if (activeTags.size && ![...activeTags].every(t => c.tags.includes(t))) return false;
    if (search) {
      const hay = normTxt(`${c.name} ${c.area} ${c.address} ${c.by} ${regionOf(c)} ${c.tags.join(' ')}`);
      if (!hay.includes(normTxt(search))) return false;
    }
    return true;
  });
  if (userPos) {
    out.forEach(c => c._d = (c.lat && c.lng) ? haversine(userPos, c) : Infinity);
    out.sort((a,b) => a._d - b._d);
  }
  return out;
}

/* ===========================================================
   渲染：地區列
   =========================================================== */
function renderRegions() {
  const bar = document.getElementById('regionBar');
  const regions = allRegions();
  // 只有一個地區時不必顯示
  if (regions.length <= 1) { bar.classList.add('hidden'); bar.innerHTML=''; return; }
  bar.classList.remove('hidden');
  bar.className = 'regionbar';
  bar.innerHTML = '';
  const pin = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22z"/><circle cx="12" cy="10" r="3"/></svg>';
  const all = document.createElement('button');
  all.className = 'rchip' + (activeRegion==='' ? ' on' : '');
  all.innerHTML = pin + '全部地區 <span class="ct">' + CAFES.length + '</span>';
  all.onclick = () => { activeRegion=''; renderRegions(); renderAll(); };
  bar.appendChild(all);
  regions.forEach(r => {
    const n = CAFES.filter(c=>regionOf(c)===r).length;
    const b = document.createElement('button');
    b.className = 'rchip' + (activeRegion===r ? ' on' : '');
    b.innerHTML = esc(r) + ' <span class="ct">' + n + '</span>';
    b.onclick = () => { activeRegion = (activeRegion===r ? '' : r); renderRegions(); renderAll(); };
    bar.appendChild(b);
  });
}

/* ===========================================================
   渲染：標籤列
   =========================================================== */
function renderTags() {
  const bar = document.getElementById('tagBar');
  bar.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (activeTags.size===0 ? ' on' : '');
  all.textContent = '全部';
  all.onclick = () => { activeTags.clear(); renderTags(); renderAll(); };
  bar.appendChild(all);
  TAGS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'chip' + (activeTags.has(t.key) ? ' on' : '');
    b.innerHTML = `<span class="dot">${t.icon}</span>${t.key}`;
    b.onclick = () => { activeTags.has(t.key) ? activeTags.delete(t.key) : activeTags.add(t.key); renderTags(); renderAll(); };
    bar.appendChild(b);
  });
}

/* ===========================================================
   渲染：列表
   =========================================================== */
function buildCard(c) {
  const el = document.createElement('div');
  el.className = 'cafe';
  const distHtml = (userPos && c._d != null && c._d !== Infinity)
    ? (()=>{ const d=fmtDist(c._d); return `<div class="dist"><div class="n mono">${d.n}</div><div class="u">${d.u}</div></div>`; })()
    : (()=>{ const r=regionOf(c); return r && r!=='其他' ? `<div class="region-badge">${esc(r)}</div>` : ''; })();
  el.innerHTML = `
    <div class="cafe-top">
      <div class="cafe-headmain">
        <div class="cafe-name">${esc(c.name)}</div>
        <div class="cafe-area"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22z"/><circle cx="12" cy="10" r="3"/></svg><span>${esc(displayLoc(c))}</span></div>
      </div>
      ${distHtml}
    </div>
    ${Array.isArray(c.photo) && c.photo.length ? `<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">${c.photo.map((src,i)=>`<img src="${src}" style="width:56px;height:56px;object-fit:cover;border-radius:9px;cursor:pointer;border:1px solid var(--line);" onclick="event.stopPropagation();openLightboxIdx(${CAFES.indexOf(c)},${i})">`).join('')}</div>` : (c.photo && typeof c.photo==='string' && c.photo.startsWith('data:') ? `<img class="cafe-photo" src="${c.photo}" onclick="event.stopPropagation();openLightboxIdx(${CAFES.indexOf(c)},0)">` : '')}
    <div class="reason-wrap"><div class="reason">${esc(c.reason)}</div></div>
    ${c.tags.length ? `<div class="cafe-tags">${c.tags.map(t=>`<span class="tg">${tagIcon(t)} ${esc(t)}</span>`).join('')}</div>` : ''}
    <div class="cafe-foot">
      <div class="byline"><span class="av">${esc(initial(c.by))}</span>由 <b>${esc(c.by||'匿名')}</b> 推薦</div>
      <div class="foot-actions">
        <button class="report-btn" onclick="event.stopPropagation();openReport(this)" data-cname="${esc(c.name)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>回報</button>
        <a class="act" href="${mapsUrl(c)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22z"/><circle cx="12" cy="10" r="3"/></svg>地點</a>
        <a class="act primary" href="${navUrl(c)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>導航</a>
      </div>
    </div>`;
  el.onclick = () => { if (c.lat && c.lng) { setView('map'); map.setView([c.lat, c.lng], 16); openMarker(c); } };
  return el;
}

function renderList(data) {
  const list = document.getElementById('list');
  list.innerHTML = '';
  if (!data.length) {
    list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><p>找不到符合的咖啡廳</p><p class="sm">試試其他關鍵字或清除地區、標籤篩選</p></div>`;
    return;
  }
  // 「全部地區」且未依距離排序時，用地區標題分組；否則平鋪
  const grouped = !activeRegion && !userPos && allRegions().length > 1;
  if (!grouped) {
    data.forEach(c => list.appendChild(buildCard(c)));
    return;
  }
  const pin = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22z"/><circle cx="12" cy="10" r="3"/></svg>';
  const order = []; const byR = {};
  data.forEach(c => { const r=regionOf(c); if(!byR[r]){byR[r]=[];order.push(r);} byR[r].push(c); });
  order.forEach(r => {
    const g = document.createElement('div'); g.className = 'rgroup';
    const head = document.createElement('div'); head.className = 'rhead';
    head.innerHTML = `${pin}<span class="nm">${esc(r)}</span><span class="ct">${byR[r].length}</span><span class="ln"></span>`;
    g.appendChild(head);
    const inner = document.createElement('div'); inner.className = 'list-inner';
    byR[r].forEach(c => inner.appendChild(buildCard(c)));
    g.appendChild(inner);
    list.appendChild(g);
  });
}

/* ===========================================================
   渲染：地圖（Leaflet + OSM / CartoDB 深淺色圖磚）
   =========================================================== */
function tileUrl() {
  return document.documentElement.classList.contains('dark')
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
}
function ensureMap() {
  if (map) return;
  map = L.map('map', { scrollWheelZoom: false }).setView(CONFIG.DEFAULT_CENTER, CONFIG.DEFAULT_ZOOM);
  tileLayer = L.tileLayer(tileUrl(), { maxZoom: 19, attribution: '© OpenStreetMap, © CARTO' }).addTo(map);
}
function refreshTiles() { if (tileLayer) tileLayer.setUrl(tileUrl()); }
function pinIcon() {
  return L.divIcon({ className:'', html:`<div style="width:30px;height:30px;transform:translate(-50%,-100%);"><svg viewBox="0 0 24 24" fill="#7E8D85" stroke="#fff" stroke-width="1.5"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22z"/><circle cx="12" cy="10" r="3" fill="#fff" stroke="none"/></svg></div>`, iconSize:[30,30], iconAnchor:[0,0] });
}
function openMarker(c) {
  const m = markers.find(x => x._cafe === c);
  if (m) m.openPopup();
}
function renderMap(data) {
  ensureMap();
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const pts = [];
  data.filter(c=>c.lat&&c.lng).forEach(c => {
    const m = L.marker([c.lat, c.lng], { icon: pinIcon() }).addTo(map);
    m._cafe = c;
    const dist = (userPos && c._d!=null && c._d!==Infinity) ? (()=>{const d=fmtDist(c._d);return ` · ${d.n}${d.u}`;})() : '';
    m.bindPopup(`<div class="popup-card">${c.photo?`<img src="${c.photo}" class="popup-photo">`:''}<div class="popup-name">${esc(c.name)}</div><div class="popup-area"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22z"/><circle cx="12" cy="10" r="3"/></svg>${esc(displayLoc(c))}${dist}</div>${c.reason?`<div class="popup-reason">${esc(c.reason.slice(0,80))}${c.reason.length>80?'…':''}</div>`:''} ${c.tags.length?`<div class="popup-tags">${c.tags.map(t=>`<span class="popup-tag">${tagIcon(t)} ${esc(t)}</span>`).join('')}</div>`:''}<div class="popup-actions"><a class="popup-btn" href="${mapsUrl(c)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 20 10.2C20 17.5 12 22 12 22z"/><circle cx="12" cy="10" r="3"/></svg>地點</a><a class="popup-btn primary" href="${navUrl(c)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="#fff" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>導航</a></div></div>`, {maxWidth:240, className:'cafe-popup'});
    markers.push(m);
    pts.push([c.lat, c.lng]);
  });
  if (userPos) pts.push([userPos.lat, userPos.lng]);
  if (pts.length) { try { map.fitBounds(pts, { padding:[40,40], maxZoom:15 }); } catch(e){} }
  setTimeout(()=>map.invalidateSize(), 60);
}

/* ===========================================================
   定位
   =========================================================== */
function toggleLocate() {
  const btn = document.getElementById('locBtn');
  if (userPos) { // 關閉定位
    userPos = null;
    if (userMarker && map) { map.removeLayer(userMarker); userMarker = null; }
    btn.classList.remove('on');
    document.getElementById('locLabel').textContent = '附近';
    renderAll();
    return;
  }
  if (!navigator.geolocation) { alert('此瀏覽器不支援定位'); return; }
  btn.classList.add('loading');
  document.getElementById('locLabel').textContent = '定位中';
  navigator.geolocation.getCurrentPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      btn.classList.remove('loading'); btn.classList.add('on');
      document.getElementById('locLabel').textContent = '依距離';
      if (map) {
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker([userPos.lat, userPos.lng], { radius:8, color:'#fff', weight:3, fillColor:'#B5654A', fillOpacity:1 }).addTo(map).bindPopup('你的位置');
      }
      renderAll();
    },
    err => {
      btn.classList.remove('loading');
      document.getElementById('locLabel').textContent = '附近';
      alert('無法取得位置：' + (err.code===1 ? '請允許定位權限' : '請稍後再試') + '。\n（仍可使用每間店的「導航」按鈕，由 Google 地圖計算距離）');
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:60000 }
  );
}

/* ===========================================================
   檢視切換 + 主渲染
   =========================================================== */
function setView(v) {
  view = v;
  document.getElementById('vList').classList.toggle('on', v==='list');
  document.getElementById('vMap').classList.toggle('on', v==='map');
  document.getElementById('map').classList.toggle('hidden', v!=='map');
  document.getElementById('list').classList.toggle('hidden', v==='map');
  renderAll();
}
function renderAll() {
  const data = getFiltered();
  document.getElementById('count').innerHTML = `共 <b>${data.length}</b> 間咖啡廳`;
  if (view==='list') renderList(data); else renderMap(data);
}

/* ===========================================================
   回報錯誤 Modal
   =========================================================== */
function openReport(btn) {
  if (document.getElementById('reportModal')) return;
  const cafeName = btn && btn.dataset ? btn.dataset.cname : String(btn||'');
  const bd = document.createElement('div'); bd.id='reportModal'; bd.className='modal-backdrop';
  bd.innerHTML=`<div class="modal">
    <h3>回報資料錯誤</h3>
    <input type="hidden" id="reportCafeName" value="${cafeName}">
    <p class="sub">將通知管理者確認並修正。<b>店家：${cafeName}</b></p>
    <select id="reportType">
      <option value="資訊有誤">資訊有誤（地址、電話、營業時間等）</option>
      <option value="已歇業">已歇業／永久關閉</option>
      <option value="內容不適當">內容不適當</option>
      <option value="其他">其他問題</option>
    </select>
    <textarea id="reportDesc" placeholder="請說明哪裡有誤、正確的資料將更好…" rows="3"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeReport()">取消</button>
      <button class="modal-submit" onclick="sendReport(document.getElementById('reportCafeName').value)">送出回報</button>
    </div>
  </div>`;
  bd.addEventListener('click', e=>{ if(e.target===bd) closeReport(); });
  document.body.appendChild(bd);
}
function closeReport() { const m=document.getElementById('reportModal'); if(m) m.remove(); }
async function sendReport(name) {
  const type = document.getElementById('reportType').value;
  const desc = document.getElementById('reportDesc').value.trim();
  if(!desc){ document.getElementById('reportDesc').focus(); return; }
  closeReport();
  if (CONFIG.APPS_SCRIPT_URL) {
    try { await fetch(CONFIG.APPS_SCRIPT_URL, { method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ _action:'report', cafeName:name, reportType:type, desc }) }); } catch(e) {}
  }
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);padding:11px 20px;border-radius:11px;font-size:13px;font-weight:700;z-index:99;pointer-events:none;';
  t.textContent='回報已送出，感謝！管理者會盡快處理。'; document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}

/* ===========================================================
   圖片燈箱
   =========================================================== */
function openLightbox(src) {
  const lb=document.createElement('div'); lb.className='photo-lb';
  lb.innerHTML='<img src="'+src+'" alt="">';
  lb.onclick=()=>lb.remove(); document.body.appendChild(lb);
}
function openLightboxIdx(idx, photoIdx) {
  const c = CAFES[idx];
  if (!c) return;
  const src = Array.isArray(c.photo) ? c.photo[photoIdx||0] : c.photo;
  if (src) openLightbox(src);
}

/* ===========================================================
   主題
   =========================================================== */
function applyTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  const ic = document.getElementById('themeIcon');
  ic.innerHTML = dark
    ? '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  try { localStorage.setItem('cafe_theme', dark ? 'dark' : 'light'); } catch(e){}
  refreshTiles();
}

/* ===========================================================
   啟動
   =========================================================== */
async function boot() {
  // theme: 跟隨系統或記住的選擇
  let dark;
  try { const s = localStorage.getItem('cafe_theme'); dark = s ? s==='dark' : matchMedia('(prefers-color-scheme: dark)').matches; }
  catch(e){ dark = false; }
  applyTheme(dark);

  document.getElementById('themeBtn').onclick = () => applyTheme(!document.documentElement.classList.contains('dark'));
  document.getElementById('locBtn').onclick = toggleLocate;
  document.getElementById('vList').onclick = () => setView('list');
  document.getElementById('vMap').onclick = () => setView('map');
  document.getElementById('searchInput').oninput = e => { search = e.target.value; renderAll(); };

  renderTags();
  document.getElementById('list').innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
  await loadData();
  renderRegions();
  renderAll();
}
boot();
</script>
