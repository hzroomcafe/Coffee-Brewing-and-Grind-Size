        // ==========================================
        // 工具 1: 沖煮參數查詢
        // ==========================================
        function BrewTool({ lang, t }) {
            const { DRIPPER_CATEGORIES, RECIPE_DATABASE } = useDatabases(lang);
            const [selectedDripperId, setSelectedDripperId] = useState('');
            const [selectedRecipeId, setSelectedRecipeId] = useState(null);
            const [customWeight, setCustomWeight] = useState(15); 
            const [isSelectorOpen, setIsSelectorOpen] = useState(false);

            const handleDripperChange = (id) => { setSelectedDripperId(id); setIsSelectorOpen(false); setSelectedRecipeId(null); };
            const handleSelectRecipe = (recipe) => { setSelectedRecipeId(recipe.id); setCustomWeight(recipe.baseCoffee); setIsSelectorOpen(false); };

            const filteredRecipes = selectedDripperId ? RECIPE_DATABASE.filter(r => r.dripper === selectedDripperId) : [];
            const selectedRecipe = RECIPE_DATABASE.find(r => r.id === selectedRecipeId);

            return (
                <div className="space-y-5 animate-in slide-in-from-bottom-4 duration-300">
                    <div className={`${colors.card} rounded-2xl shadow-sm border ${colors.border} p-4`}>
                        <label className={`flex items-center gap-2 text-sm font-bold ${colors.textDark} mb-3`}><Filter size={16} className={colors.primaryText} /> {t('select_dripper')}</label>
                        <div className="relative">
                            <select value={selectedDripperId} onChange={(e) => handleDripperChange(e.target.value)} className={`w-full bg-[#F9F8F6] border ${selectedDripperId === '' ? 'text-gray-400' : 'text-gray-800'} ${colors.border} font-bold py-3.5 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#7E8D85] appearance-none`}>
                                <option value="" disabled>{t('select_dripper_placeholder')}</option>
                                {Object.entries(DRIPPER_CATEGORIES).map(([category, drippers]) => (
                                    <optgroup key={category} label={category} className="text-gray-500 font-bold">
                                        {drippers.map(d => <option key={d.id} value={d.id} className="text-gray-800 font-medium">{d.name}</option>)}
                                    </optgroup>
                                ))}
                            </select>
                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400"><ChevronDown size={20} /></div>
                        </div>
                    </div>

                    {!selectedDripperId ? (
                        <div className={`${colors.card} rounded-2xl shadow-sm border ${colors.border} p-12 text-center animate-in fade-in duration-300`}>
                            <div className={`w-16 h-16 mx-auto ${colors.bg} rounded-full flex items-center justify-center mb-4 ${colors.secondaryText}`}><Filter size={32} /></div>
                            <h3 className={`text-lg font-bold ${colors.textDark} mb-1`}>{t('no_dripper_title')}</h3>
                            <p className={`text-sm ${colors.textMuted}`}>{t('no_dripper_desc')}</p>
                        </div>
                    ) : filteredRecipes.length > 0 ? (
                        <div className="space-y-4 animate-in fade-in duration-300">
                            <div className="relative z-20">
                                <button onClick={() => setIsSelectorOpen(!isSelectorOpen)} className={`w-full text-left bg-white border ${isSelectorOpen ? 'border-[#7E8D85] ring-2 ring-[#7E8D85] ring-opacity-20' : colors.border} rounded-2xl p-4 shadow-sm transition-all flex items-center justify-between`}>
                                    {selectedRecipe ? (
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2.5 rounded-full ${selectedRecipe.drinkType === 'iced' ? colors.icedTag : colors.hotTag}`}>{selectedRecipe.drinkType === 'iced' ? <Snowflake size={20} /> : <Flame size={20} />}</div>
                                            <div>
                                                <div className="text-[11px] font-bold text-gray-400 mb-0.5">{t('current_recipe')}</div>
                                                <div className={`font-bold text-lg ${colors.textDark}`}>{selectedRecipe.name}</div>
                                            </div>
                                        </div>
                                    ) : (<div className="font-bold text-gray-400 text-lg">{t('select_recipe')}</div>)}
                                    <div className={`p-2 rounded-full ${colors.bg} text-gray-500 transition-transform duration-300 ${isSelectorOpen ? 'rotate-180' : ''}`}><ChevronDown size={20} /></div>
                                </button>
                                {isSelectorOpen && (
                                    <div className={`absolute top-full left-0 right-0 mt-2 bg-white border ${colors.border} rounded-2xl shadow-xl overflow-hidden animate-in slide-in-from-top-2 duration-200 max-h-[60vh] overflow-y-auto`}>

                            <p className={`text-sm ${colors.textMuted}`}>{t('no_recipe_desc')}</p>
                        </div>

        function BrewRecipeDetail({ recipe, customWeight, setCustomWeight, t }) {
            const ratio = (customWeight / recipe.baseCoffee) || 1;
            const isIced = recipe.drinkType === 'iced';
            const maxWater = Math.max(...recipe.steps.map(s => s.water || 0));
            const baseRatio = (maxWater / recipe.baseCoffee).toFixed(1).replace('.0', '');
            const renderDynamicText = (textObj) => typeof textObj === 'function' ? textObj(ratio) : textObj;

            return (
                <div className="space-y-4">
                    <div className={`${colors.card} rounded-2xl shadow-sm border ${colors.border} p-6 flex flex-col items-center justify-center relative overflow-hidden`}>
                        <div className={`absolute top-0 left-0 w-1.5 h-full ${isIced ? colors.blue : colors.secondary}`}></div>
                        <p className={`text-sm font-bold ${colors.textDark} mb-5 flex items-center gap-2`}>
                            {t('auto_calc_title')} <Droplets size={18} className={isIced ? colors.blueText : colors.secondaryText}/>
                        </p>
                        <div className="flex items-center gap-6">
                            <button onClick={() => setCustomWeight(Math.max(1, customWeight - 1))} className={`w-14 h-14 flex items-center justify-center rounded-full border-2 ${colors.border} text-gray-500 hover:bg-[#F4F1EA] active:bg-[#E2DED3] text-2xl font-medium transition-colors`}>-</button>
                            <div className="relative flex items-baseline">
                                <input type="number" value={customWeight || ''} onChange={(e) => setCustomWeight(Number(e.target.value))} className={`w-24 text-center text-6xl font-black ${colors.textDark} bg-transparent focus:outline-none`} />
                                <span className={`text-xl font-bold ${colors.textMuted} ml-1`}>g</span>
                            </div>
                            <button onClick={() => setCustomWeight(customWeight + 1)} className={`w-14 h-14 flex items-center justify-center rounded-full border-2 ${colors.border} text-gray-500 hover:bg-[#F4F1EA] active:bg-[#E2DED3] text-2xl font-medium transition-colors`}>+</button>
                        </div>
                    </div>
                    <div className={`${colors.card} rounded-2xl shadow-sm border ${colors.border} overflow-hidden`}>
                        {recipe.description && (
                            <div className={`p-5 text-[13px] ${colors.textDark} leading-relaxed bg-[#F9F8F6] border-b ${colors.border} whitespace-pre-wrap`}>{renderDynamicText(recipe.description)}</div>
                        )}
                        <div className="p-4 grid grid-cols-3 gap-2 sm:gap-3 bg-white">
                            <div className={`flex flex-col items-center justify-center gap-1.5 ${colors.bg} p-3 rounded-xl border border-transparent`}>
                                <div className={`p-1.5 rounded-full bg-white ${colors.redText} shadow-sm mb-1`}><Thermometer size={16} /></div>
                                <p className={`text-[10px] uppercase font-bold tracking-wider ${colors.textMuted}`}>{t('suggest_temp')}</p>
                                <p className={`font-bold text-base ${colors.textDark}`}>{recipe.temperature}°C</p>
                            </div>
                            <div className={`flex flex-col items-center justify-center gap-1.5 ${colors.bg} p-3 rounded-xl border border-transparent`}>
                                <div className={`p-1.5 rounded-full bg-white ${colors.yellowText} shadow-sm mb-1`}><Scale size={16} /></div>
                                <p className={`text-[10px] uppercase font-bold tracking-wider ${colors.textMuted}`}>{t('suggest_weight')}</p>
                                <p className={`font-bold text-base ${colors.textDark}`}>{recipe.baseCoffee}g</p>
                            </div>
                            <div className={`flex flex-col items-center justify-center gap-1.5 ${colors.bg} p-3 rounded-xl border border-transparent`}>
                                <div className={`p-1.5 rounded-full bg-white ${colors.blueText} shadow-sm mb-1`}><Settings2 size={16} /></div>
                                <p className={`text-[10px] uppercase font-bold tracking-wider ${colors.textMuted}`}>{t('base_ratio')}</p>
                                <p className={`font-bold text-base ${colors.textDark}`}>1 : {baseRatio}</p>
                            </div>
                        </div>
                    </div>
                    <div className={`${colors.card} rounded-2xl shadow-sm border ${colors.border} p-5 pb-6`}>
                        <h3 className={`text-lg font-bold ${colors.textDark} mb-6 flex items-center gap-2 pb-3 border-b border-[#F4F1EA]`}>
                            <Clock size={20} className={colors.primaryText}/> {t('brew_steps')}
                            {ratio !== 1 && <span className={`ml-auto text-xs font-bold text-white ${colors.secondary} px-2 py-1 rounded-md`}>{t('converted_ratio')} {(ratio * 100).toFixed(0)}%</span>}
                        </h3>
                        <div className="relative border-l-2 border-[#E2DED3] ml-3 space-y-8 pb-2">
                            {recipe.steps.map((step, index) => {
                                const scaledWater = step.water !== null ? Math.round(step.water * ratio) : null;
                                const isTextTime = isNaN(parseInt(step.time.charAt(0))) || step.time.length > 5; 
                                return (
                                    <div key={step.id || index} className="relative pl-6">
                                        <div className={`absolute -left-[9px] top-1 w-4 h-4 rounded-full border-2 border-white ${step.water ? (isIced ? colors.blue : colors.primary) : colors.secondary}`}></div>
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1 pr-3">
                                                <div className="flex items-center flex-wrap gap-2 mb-1.5">
                                                    <span className={`font-mono font-black ${isTextTime ? 'text-[0.95rem]' : 'text-[1.1rem]'} ${colors.textDark}`}>{step.time}</span>
                                                    {step.action && <span className={`text-[11px] px-2 py-0.5 rounded-md ${isIced ? colors.icedTag : colors.hotTag} font-bold whitespace-nowrap`}>{step.action}</span>}
                                                </div>
                                                <p className={`text-sm ${colors.textDark} leading-relaxed`}>{renderDynamicText(step.note)}</p>
                                            </div>
                                            {scaledWater !== null && (
                                                <div className="text-right shrink-0 bg-[#F9F8F6] px-4 py-2 rounded-xl border border-[#E2DED3] min-w-[70px]">
                                                    <div className={`text-2xl font-black ${isIced ? colors.blueText : colors.primaryText} leading-none`}>{scaledWater}<span className="text-sm font-bold ml-0.5 text-gray-500">g</span></div>
                                                    {ratio !== 1 && <div className={`text-[10px] text-gray-400 mt-1 font-bold`}>({t('original_water')} {step.water}g)</div>}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 2: 磨豆機刻度轉換
        // ==========================================
        function GrindTool({ lang, t }) {
            const { GRINDER_DATABASE } = useDatabases(lang);
            const [grinderA, setGrinderA] = useState('');
            const [grinderB, setGrinderB] = useState('');
            const [valA, setValA] = useState('');

            const groups = useMemo(() => {
                let grps = {};
                Object.entries(GRINDER_DATABASE).forEach(([key, g]) => {
                    if (!grps[g.group]) grps[g.group] = [];
                    grps[g.group].push({ key, name: g.name });
                });
                return grps;
            }, [GRINDER_DATABASE]);

            const handleSwap = () => {
                const temp = grinderA; setGrinderA(grinderB); setGrinderB(temp);
                if (result && result.valB && result.valB !== '-') setValA(result.valB.toString());
            };

            const result = useMemo(() => {
                const gA = GRINDER_DATABASE[grinderA]; const gB = GRINDER_DATABASE[grinderB]; const parsedA = parseFloat(valA);
                if (!gA || !gB || isNaN(parsedA)) return null;

                const rFirst = gA.ranges.find(r => r.min !== null);
                const rLast = [...gA.ranges].reverse().find(r => r.max !== null);

                if (parsedA < rFirst.min) return { error: `${t('err_low')} ${rFirst.min})`, catIdx: -1 };
                if (parsedA > rLast.max) return { error: `${t('err_high')} ${rLast.max})`, catIdx: -1 };

                let catIdx = -1; let ratio = 0;
                for (let i=0; i<gA.ranges.length; i++) {
                    let r = gA.ranges[i];
                    if (r.min !== null && r.max !== null && parsedA >= r.min && parsedA <= r.max) { catIdx = i; ratio = (parsedA - r.min) / (r.max - r.min); break; }
                }

                if (catIdx === -1) return { error: t('err_match'), catIdx: -1 };

                const rB = gB.ranges[catIdx];
                if (rB.min === null || rB.max === null) return { error: `${t('err_notsupport')} ${t('grind_cats_inline')[catIdx]}`, catIdx };

                let valB = rB.min + ratio * (rB.max - rB.min);
                if (gB.step === 1) { valB = Math.round(valB); } 
                else { let inv = 1.0 / gB.step; valB = Math.round(valB * inv) / inv; valB = parseFloat(valB.toFixed(2)); }

                return { valB, catIdx, catName: t('grind_cats_inline')[catIdx] };
            }, [grinderA, grinderB, valA, t, GRINDER_DATABASE]);

            const selectOptions = (
                <React.Fragment>
                    <option value="" disabled>{t('select_grinder_placeholder')}</option>
                    {Object.entries(groups).map(([gName, items]) => (
                        <optgroup key={gName} label={gName} className="text-gray-500 font-bold">
                            {items.map(item => <option key={item.key} value={item.key} className="text-gray-800 font-medium">{item.name}</option>)}
                        </optgroup>
                    ))}
                </React.Fragment>
            );

            return (
                <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-300">
                    <div className="flex flex-col md:flex-row items-center gap-4 relative">
                        <div className={`flex-1 w-full ${colors.card} p-5 rounded-2xl border border-[#7A93A2]/30 shadow-sm bg-[#7A93A2]/5`}>
                            <label className={`block text-sm font-bold ${colors.blueText} mb-2`}>{t('from_grinder')}</label>
                            <select value={grinderA} onChange={e => setGrinderA(e.target.value)} className={`w-full p-3 rounded-xl border border-[#7A93A2]/40 bg-white mb-4 outline-none focus:ring-2 focus:ring-[#7A93A2] text-sm font-bold`}>{selectOptions}</select>
                            <label className={`block text-sm font-bold ${colors.blueText} mb-2`}>{t('current_grind')}</label>
                            <input type="number" value={valA} onChange={e => setValA(e.target.value)} placeholder={t('input_placeholder')} className={`w-full p-3 text-2xl font-black text-center rounded-xl border border-[#7A93A2]/40 bg-white outline-none focus:ring-2 focus:ring-[#7A93A2]`} />
                            <div className={`text-center text-xs font-bold text-[#7A93A2]/80 mt-2 min-h-[32px] flex items-center justify-center`}>{grinderA ? GRINDER_DATABASE[grinderA].unit : t('unit')}</div>
                        </div>

                        <button onClick={handleSwap} className={`p-3 bg-white border-2 ${colors.border} hover:bg-[#F4F1EA] ${colors.primaryText} rounded-full shadow-sm transition-all z-10 active:scale-95 group`}>
                            <ArrowRightLeft size={24} className="group-hover:rotate-180 transition-transform duration-300" />
                        </button>

                        <div className={`flex-1 w-full ${colors.card} p-5 rounded-2xl border border-[#B3A394]/30 shadow-sm bg-[#B3A394]/5`}>
                            <label className={`block text-sm font-bold ${colors.secondaryText} mb-2`}>{t('to_grinder')}</label>
                            <select value={grinderB} onChange={e => setGrinderB(e.target.value)} className={`w-full p-3 rounded-xl border border-[#B3A394]/40 bg-white mb-4 outline-none focus:ring-2 focus:ring-[#B3A394] text-sm font-bold`}>{selectOptions}</select>
                            <label className={`block text-sm font-bold ${colors.secondaryText} mb-2`}>{t('target_grind')}</label>
                            <div className={`w-full p-3 text-3xl font-black text-center ${result?.error ? 'text-red-500' : colors.secondaryText} bg-white rounded-xl border border-[#B3A394]/40 h-[62px] flex items-center justify-center shadow-inner`}>
                                {result ? (result.error ? 'N/A' : result.valB) : '-'}
                            </div>
                            <div className={`text-center text-xs font-bold text-[#B3A394]/80 mt-2 min-h-[32px] flex items-center justify-center`}>{grinderB ? GRINDER_DATABASE[grinderB].unit : t('unit')}</div>
                        </div>
                    </div>

                    {result && (
                        <div className={`${colors.card} p-6 rounded-2xl shadow-sm border ${colors.border} animate-in fade-in duration-300`}>
                            <div className={`text-center text-sm font-bold p-4 bg-[#F9F8F6] rounded-xl border ${colors.border} mb-6 ${result.error ? 'text-red-500' : colors.textDark}`}>
                                {result.error ? result.error : (<span>{t('grind_result_msg')} <strong className={colors.primaryText}>{result.catName}</strong>{t('mapped_linear')}</span>)}
                            </div>
                            <div className="px-2">
                                <div className={`text-xs font-bold ${colors.textMuted} mb-3 flex items-center gap-2`}><Settings2 size={16} /> {t('grind_visual')}</div>
                                <div className={`flex h-4 rounded-full overflow-hidden ${colors.bg} shadow-inner border ${colors.border}`}>
                                    {t('grind_cats').map((cat, idx) => (<div key={idx} className={`w-1/5 border-r border-white/30 transition-colors duration-300 ${result.catIdx === idx ? colors.bar[idx] : ''}`}></div>))}
                                </div>
                                <div className={`flex text-[10px] sm:text-xs ${colors.textMuted} mt-2 font-bold`}>
                                    {t('grind_cats').map((cat, idx) => (<span key={idx} className={`w-1/5 text-center whitespace-pre-wrap ${result.catIdx === idx ? colors.textDark : ''}`}>{cat}</span>))}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className={`p-5 ${colors.bg} rounded-2xl border ${colors.border} text-[12px] sm:text-[13px] ${colors.textMuted} leading-relaxed`}>
                        <strong className={`${colors.textDark} block mb-2`}>{t('hint_title')}</strong>
                        <ul className="list-disc pl-5 space-y-1.5">
                            <li>{t('hint_1')}</li>
                            <li>{t('hint_2')}</li>
                            <li>{t('hint_3')}</li>
                            <li>{t('hint_4')}</li>
                        </ul>
                    </div>
                </div>
            );
        }

        // 初始化渲染
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
