// 長按連續加減：滑鼠/觸控按住後加速重複觸發
function useHold() {
  const timer = useRef(null);
  const start = (fn) => {
    fn();
    let delay = 350;
    const tick = () => { fn(); delay = Math.max(40, delay * 0.8); timer.current = setTimeout(tick, delay); };
    timer.current = setTimeout(tick, delay);
  };
  const stop = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  useEffect(() => stop, []);
  return { start, stop };
}

      const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
      return `${50 + r * Math.cos(angle)},${50 + r * Math.sin(angle)}`;
    }).join(' ');
  }, [scores]);

  const getDiagnosis = () => {

      return { title: l("雷達處於預設狀態 (Default State)", "Default Radar", "デフォルト状態"), desc: l("請拉動數值描繪風味。系統將綜合咖啡萃取科學與參數變因，為您解析可溶性芳香物質的釋放階段，並提供大方向的專業微調建議。", "Adjust sliders to map your flavor. The system applies Extraction Theory to analyze soluble compound release and offer professional parameter corrections.", "数値をスライドして風味を描いてください。抽出理論に基づき、可溶性成分の放出を分析し、専門的なパラメータ補正を大枠で提案します。") };
    }
    if (s >= 4 && af >= 4 && b <= 2) {
      return { title: l("理想萃取 / 貼近甜蜜點 (Ideal Extraction)", "Ideal Extraction", "理想的な抽出"), desc: l("【科學成因】\n甜感飽滿且餘韻綿長，表示萃取率 (EY) 完美落在 18%-22% 的理想區間。優質芳香物質與梅納反應產生的中大分子糖分已充分釋放，且成功避開了沖煮尾段的重度苦味物質。\n\n【調整建議】\n這是一次極高水準的沖煮！請鎖定目前的「水粉比、水溫、研磨度」鐵三角，依此為基準點微調即可。", "[Science]\nEY hitting the 18-22% sweet spot. Maillard reaction sugars are fully dissolved, avoiding late-stage bitter compounds.\n\n[Action]\nOutstanding brew! Lock in your current brew ratio, temperature, and grind size as your golden baseline.", "豊かな甘みと長い余韻は、収率(EY)が18-22%の理想的な範囲にあることを示します。非常に素晴らしい抽出です！現在の粉量、湯温、挽き目をベースラインとして固定してください。") };
    }
    if (a >= 4 && b >= 4) {
      return { title: l("極端不均萃取 / 通道效應 (Uneven Extraction)", "Channeling", "不均一な抽出 / チャネリング"), desc: l("【科學成因】\n同時出現尖銳有機酸與木質部苦澀，是典型的「通道效應」。水流避開了大部分粉層，導致局部粉層被過度萃取，而其餘粉層萃取不足。\n\n【調整建議】\n1. 改善佈水均勻度，注水時避免水流過大或直接衝擊濾紙邊緣。\n2. 檢查磨豆機均勻度，若細粉過多易導致底部阻塞而引發側邊通道。", "[Science]\nSimultaneous sharp acids and harsh bitterness indicate channeling. Water bypasses the bed, locally over-extracting while under-extracting the rest.\n\n[Action]\n1. Improve pouring technique; avoid hitting filter edges.\n2. Check grinder consistency; excess fines can force side channels.", "鋭い酸味と渋みが同時に現れるのは典型的なチャネリングです。注湯の均一性を改善し、ミルの均一性を確認してください。") };
    }
    if (b >= 4) {
      return { title: l("萃取過度 / 乾餾物質釋出 (Over-Extraction)", "Over-Extraction", "過抽出 (オーバーエクストラクション)"), desc: l("【科學成因】\n咖啡風味溶出順序為：酸 ➔ 甜 ➔ 苦。當苦澀感佔據主導，意味著萃取進入尾段，將大分子的多酚類與乾餾物質強制溶出。這通常肇因於：水溫過高，或擾動過度。\n\n【調整建議】\n1. 研磨度調粗 1-2 格。2. 沖煮水溫降低 2-3°C。3. 減少斷水次數，採用中心平穩注入。", "[Science]\nExtraction order: Acids ➔ Sugars ➔ Bitters. Dominant harshness means late-stage high-molecular compounds were forced out.\n\n[Action]\n1. Grind 1-2 clicks coarser. 2. Lower temp by 2-3°C. 3. Reduce pouring stages.", "渋みが強い場合、終盤の成分が溶け出しています。挽き目を粗くし、湯温を2-3℃下げ、注湯回数を減らしてください。") };
    }
    if (a >= 4 && s <= 2) {
      return { title: l("萃取不足 / 有機酸失衡 (Under-Extraction)", "Under-Extraction", "未抽出 (アンダーエクストラクション)"), desc: l("【科學成因】\n水果酸最先被溶出。若在此階段後萃取動能不足帶出糖分來提供「包覆感」，就會呈現單薄且刺鼻的尖酸。主因通常是：粉粒過粗或水溫偏低。\n\n【調整建議】\n1. 研磨度調細 1-2 格。2. 提高水溫 2°C。3. 延長悶蒸時間 10 秒，確保粉層完全濕潤。", "[Science]\nLow-weight acids extract first. Without mid-stage sugars to envelop them, the acidity tastes sharp. Causes: grind too coarse or water too cool.\n\n[Action]\n1. Grind 1-2 clicks finer. 2. Raise temp by 2°C. 3. Extend bloom time.", "糖分が不足すると、鋭い酸味になります。原因は粗すぎる挽き目や低い湯温です。挽き目を細かくし、湯温を上げ、蒸らし時間を長くしてください。") };
    }
    if (bd <= 2 && b <= 3) {

// 10. RecipeGrindSuggestion (配方內建研磨轉換與顯微鏡)
// ==========================================
function RecipeGrindSuggestion({ recipe, GRINDER_DATABASE, t, c, lang }) {
  const classes = useClasses(c);
  const [isGrindOpen, setIsGrindOpen] = useState(false);
  const [userGrinder, setUserGrinder] = useState('');

  const grindGroups = useMemo(() => {
    let grps = {};
    Object.entries(GRINDER_DATABASE).forEach(([key, g]) => {
      if (!grps[g.group]) grps[g.group] = [];
      grps[g.group].push({ key, name: g.name });
    });
    Object.keys(grps).forEach((k) => {
      grps[k].sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
    });
    return grps;
  }, [GRINDER_DATABASE]);

  const convertedGrind = useMemo(() => {
    if (!userGrinder || !recipe.baseGrind) return null;
    const gA = GRINDER_DATABASE[recipe.baseGrind.grinder];const gB = GRINDER_DATABASE[userGrinder];const parsedA = parseFloat(recipe.baseGrind.val);
    if (!gA || !gB || isNaN(parsedA)) return null;
    let catIdx = -1;let r_ratio = 0;
    for (let i = 0; i < gA.ranges.length; i++) {let r = gA.ranges[i];if (r.min !== null && r.max !== null && parsedA >= r.min && parsedA <= r.max) {catIdx = i;r_ratio = (parsedA - r.min) / (r.max - r.min);break;}}
    if (catIdx === -1) return { error: t('err_match') };
    const rB = gB.ranges[catIdx];if (rB.min === null || rB.max === null) return { error: t('err_notsupport') };
    let valB = rB.min + r_ratio * (rB.max - rB.min);
    if (gB.step === 1) valB = Math.round(valB);else {let inv = 1.0 / gB.step;valB = Math.round(valB * inv) / inv;valB = parseFloat(valB.toFixed(2));}
    return { valB, unit: gB.unit };
  }, [userGrinder, recipe, GRINDER_DATABASE, t]);

  const baseCatIdx = useMemo(() => {
    if (!recipe.baseGrind) return -1;
    const targetGrinder = userGrinder && !convertedGrind?.error ? userGrinder : recipe.baseGrind.grinder;
    const targetVal = userGrinder && !convertedGrind?.error ? convertedGrind.valB : parseFloat(recipe.baseGrind.val);
    const gA = GRINDER_DATABASE[targetGrinder];
    if (!gA || isNaN(targetVal)) return -1;
    for (let i = 0; i < gA.ranges.length; i++) {
      let r = gA.ranges[i];
      if (r.min !== null && r.max !== null && targetVal >= r.min && targetVal <= r.max) return i;
    }
    return -1;
  }, [recipe.baseGrind, userGrinder, convertedGrind, GRINDER_DATABASE]);

  return (
    <div className={`${classes.card} overflow-hidden`}>
            <button onClick={() => setIsGrindOpen(!isGrindOpen)} className={`w-full flex items-center justify-between p-4 hover:bg-black/5 dark:hover:bg-white/5 transition-colors outline-none`}>
                <div className="flex items-center gap-3"><div className={`p-1.5 rounded-full ${c.infoBg} ${c.primaryText}`}><Settings2 size={16} /></div><span className={`text-sm font-bold ${c.textDark}`}>{t('suggest_grind_title')}</span></div>
                <div className="flex items-center gap-2">
                    {!isGrindOpen &&
          <span className={`text-[11px] font-bold ${c.textMuted} bg-black/5 dark:bg-white/5 px-2 py-1 rounded-md max-w-[150px] truncate border ${c.border}`}>
                            {GRINDER_DATABASE[recipe.baseGrind.grinder].name}: <span className={c.primaryText}>{recipe.baseGrind.val}</span>
                        </span>
          }
                    <ChevronDown size={18} className={`${c.textMuted} transition-transform ${isGrindOpen ? 'rotate-180' : ''}`} />
                </div>
            </button>
            {isGrindOpen &&
      <div className={`p-5 border-t ${c.border} ${c.bg}`}>
                    <div className="flex items-end justify-between mb-4">
                        <div><div className={`text-[10px] font-bold ${c.textMuted} uppercase tracking-wider mb-1`}>{t('base_grind')}</div><div className={`text-base font-black ${c.textDark}`}>{GRINDER_DATABASE[recipe.baseGrind.grinder].name}</div></div>
                        <div className={`text-2xl font-black ${c.primaryText}`}>{recipe.baseGrind.val}</div>
                    </div>
                    <div className={`h-px w-full ${c.border} mb-4`}></div>
                    <div className={`text-[10px] font-bold ${c.textMuted} uppercase tracking-wider mb-2`}>{t('my_grinder')}</div>
                    <div className="relative">
                        <select value={userGrinder} onChange={(e) => setUserGrinder(e.target.value)} className={`${classes.select} ${userGrinder === '' ? 'text-gray-400' : c.textDark} mb-4`}>
                            <option value="" disabled>{t('select_grinder_placeholder')}</option>
                            {Object.entries(grindGroups).map(([gName, items]) => <optgroup key={gName} label={gName} className={`${c.textMuted} font-bold`}>{items.map((item) => <option key={item.key} value={item.key} className={`${c.textDark} font-medium`}>{item.name}</option>)}</optgroup>)}
                        </select>
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400 mb-4"><ChevronDown size={20} /></div>
                    </div>
                    {userGrinder &&
        <div className={`p-4 rounded-xl border ${c.border} ${c.card} flex items-center justify-between shadow-sm`}><span className={`text-sm font-bold ${c.textDark}`}>{t('converted_result')}</span>{convertedGrind?.error ? <span className="text-red-500 font-bold text-sm">{convertedGrind.error}</span> : <div className="text-right"><span className={`text-2xl font-black ${c.secondaryText}`}>{convertedGrind?.valB}</span><span className={`text-xs font-bold ${c.textMuted} ml-1`}>{convertedGrind?.unit}</span></div>}</div>
        }
                    
                    {baseCatIdx !== -1 &&
        <div className={`mt-6 pt-6 border-t ${c.border}`}>
                            <div className="px-2">
                                <div className={`text-xs font-bold ${c.textMuted} mb-3 flex items-center gap-2`}>
                                    <Settings2 size={16} /> 
                                    {userGrinder && !convertedGrind?.error ? GRINDER_DATABASE[userGrinder].name : GRINDER_DATABASE[recipe.baseGrind.grinder].name} {t('grind_visual')}
                                </div>
                                <div className={`flex h-4 rounded-full overflow-hidden ${c.bg} shadow-inner border ${c.border}`}>
                                    {t('grind_cats').map((cat, idx) =>
              <div key={idx} className={`w-1/5 border-r border-black/5 dark:border-white/10 transition-colors duration-300 ${baseCatIdx === idx ? c.bar[idx] : 'bg-transparent'}`}></div>
              )}
                                </div>
                                <div className={`flex text-[10px] sm:text-xs ${c.textMuted} mt-3 font-bold`}>
                                    {t('grind_cats').map((cat, idx) => {
                const displayGrinder = userGrinder && !convertedGrind?.error ? GRINDER_DATABASE[userGrinder] : GRINDER_DATABASE[recipe.baseGrind.grinder];
                const range = displayGrinder.ranges[idx];
                const rangeText = range && range.min !== null ? `${range.min} - ${range.max}` : '-';
                return (
                  <div key={idx} className={`w-1/5 flex flex-col items-center gap-1.5 whitespace-pre-wrap ${baseCatIdx === idx ? c.textDark : ''}`}>
                                                <span className="text-center leading-tight">{cat}</span>
                                                <span className={`px-1.5 py-0.5 rounded-md font-mono transition-all duration-300 ${baseCatIdx === idx ? `${c.bar[idx]} text-white shadow-md scale-110` : `${c.inputBg} border ${c.border}`}`}>{rangeText}</span>
                                            </div>);

              })}
                                </div>
                            </div>
                            <GrindVisualizer catIdx={baseCatIdx} c={c} lang={lang} />
                        </div>
        }
                </div>
      }
        </div>);

}

  const accentBg = T.accentBg[isIced ? 'iced' : 'hot'];
  const ink = T.ink, muted = T.muted, faint = T.faint, paper = T.paper, inset = T.inset, line = T.line;

  const totalWater = Math.round(maxWater * ratio);
  const kicker = [dripperName, recipe.author].filter(Boolean).join('  ·  ');
  const showEn = nameEn && nameEn.trim() && nameEn.trim() !== String(recipe.name).trim();
  const slug = String(nameEn || recipe.name).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40) || 'brew-card';

  const pours = recipe.steps.filter((s) => s.water != null).length;
  const totalSecs = useMemo(() => {
    let max = 0;
    recipe.steps.forEach((s) => {
      const ms = String(s.time).match(/(\d+):(\d+)/g) || [];
      ms.forEach((m) => {const [mm, ss] = m.split(':').map(Number);max = Math.max(max, mm * 60 + ss);});
    });
    return max;
  }, [recipe]);
  const fmtT = (secs) => `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, '0')}`;

  // 風味標籤：從配方描述自動擷取關鍵字
  const descText = useMemo(() => {
    try {const d = typeof recipe.description === 'function' ? recipe.description(ratio) : recipe.description;return String(d || '');} catch (e) {return '';}
  }, [recipe, ratio]);
  const flavors = useMemo(() => {
    const dict = FLAVOR_KEYWORDS[lang] || FLAVOR_KEYWORDS.zh;
    const low = descText.toLowerCase();
    const out = [];
    dict.forEach(([nd, disp]) => {if (low.includes(nd.toLowerCase()) && !out.includes(disp)) out.push(disp);});
    return out.slice(0, 3);
  }, [descText, lang]);

  const stats = [
    [t('summary_dose'), `${customWeight}`, 'g'],
    [t('summary_water'), `${totalWater}`, 'g'],
    [t('summary_ratio'), `1:${baseRatio}`, ''],
    [t('summary_temp'), `${recipe.temperature}`, '°C']];


  const saveImage = async () => {
    const cardNode = cardRef.current;
    if (busy || !cardNode || typeof html2canvas === 'undefined') return;
    setBusy(true);
    try {
      try {if (document.fonts && document.fonts.ready) await document.fonts.ready;} catch (e) {}
      const outCanvas = await html2canvas(cardNode, { scale: 3, backgroundColor: paper, useCORS: true, logging: false });
      await new Promise((resolve) => {
        outCanvas.toBlob(async (blob) => {
          if (!blob) { resolve(); return; }
          const file = new File([blob], `${slug}.png`, { type: 'image/png' });
          try {
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: recipe.name });
              resolve(); return;
            }
          } catch (e) {/* fall through to download */}
          try {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${slug}.png`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1500);
          } catch (e) {}
          resolve();
        }, 'image/png');
      });
    } catch (e) {} finally {setBusy(false);}
  };

  const metaItems = [[<Clock size={12} key="c" />, fmtT(totalSecs)], [<Droplets size={12} key="d" />, `${pours} ${t('card_pours')}`]];

  // ====== 卡片本體（會被截圖） ======
  const cardEl =
  <div ref={cardRef} style={{ width: '100%', maxWidth: CARD_W, background: paper, borderRadius: 28, overflow: 'hidden', boxShadow: `0 24px 60px ${T.shadow}`, fontFamily: "'Noto Sans TC', system-ui, sans-serif" }}>
      <div style={{ height: 6, background: accent }}></div>
      <div style={{ padding: '24px 24px 20px' }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 13, marginBottom: 16 }}>
          <div style={{ width: 44, height: 44, borderRadius: '50%', background: accentBg, color: accent, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            {isIced ? <Snowflake size={21} /> : <Flame size={21} />}
          </div>
          <div style={{ minWidth: 0, flex: 1 }}>
            {kicker && <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.13em', textTransform: 'uppercase', color: muted, marginBottom: 5 }}>{kicker}</div>}
            <div style={{ fontSize: 21, lineHeight: 1.2, fontWeight: 900, color: ink, letterSpacing: '-0.01em' }}>{recipe.name}</div>
            {showEn && <div style={{ fontSize: 12.5, fontWeight: 500, color: faint, marginTop: 3, fontStyle: 'italic' }}>{nameEn}</div>}
          </div>
        </div>

        {/* 風味標籤 */}
        {flavors.length > 0 &&
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 15 }}>
            {flavors.map((f, i) =>
          <span key={i} style={{ fontSize: 11, fontWeight: 700, color: accent, background: accentBg, padding: '4px 11px', borderRadius: 999, letterSpacing: '0.02em' }}>{f}</span>
          )}
          </div>
        }

        {/* 速覽 */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 18, marginBottom: 15, paddingLeft: 2 }}>
          {metaItems.map(([icon, val], i) =>
          <span key={i} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, color: muted, fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap' }}>
              <span style={{ color: accent, display: 'inline-flex' }}>{icon}</span>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: ink }}>{val}</span>
            </span>
          )}
        </div>

        {/* Stats */}
        <div style={{ display: 'flex', background: inset, borderRadius: 18, padding: '4px 0', marginBottom: 14 }}>
          {stats.map(([label, val, unit], i) =>
          <div key={i} style={{ flex: 1, textAlign: 'center', padding: '11px 4px', borderLeft: i === 0 ? 'none' : `1px solid ${line}` }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.09em', textTransform: 'uppercase', color: muted, marginBottom: 6 }}>{label}</div>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 800, color: ink, fontSize: 18, lineHeight: 1 }}>
                {val}<span style={{ fontSize: 11, color: muted, marginLeft: 1 }}>{unit}</span>
              </div>
            </div>
          )}
        </div>

        {/* Grind */}
        {grindLabel &&
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: inset, borderRadius: 14, padding: '10px 15px', marginBottom: 16 }}>
            <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: muted }}>{t('base_grind')}</span>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5, fontWeight: 700, color: accent }}>{grindLabel}</span>
          </div>
        }

        {/* Steps */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
          <span style={{ fontSize: 10.5, fontWeight: 800, letterSpacing: '0.1em', textTransform: 'uppercase', color: ink }}>{t('brew_steps')}</span>
          <span style={{ flex: 1, height: 1, background: line }}></span>
        </div>
        <div style={{ position: 'relative' }}>
          <div style={{ position: 'absolute', left: 7, top: 6, bottom: 10, width: 2, background: line }}></div>
          {recipe.steps.map((s, i) => {
            const w = s.water != null ? Math.round(s.water * ratio) : null;
            return (
              <div key={s.id || i} style={{ display: 'flex', gap: 12, position: 'relative', paddingBottom: i === recipe.steps.length - 1 ? 0 : 14 }}>
                <div style={{ width: 16, flexShrink: 0, display: 'flex', justifyContent: 'center', paddingTop: 4 }}>
                  <div style={{ width: 10, height: 10, borderRadius: '50%', background: w != null ? accent : paper, border: `2px solid ${accent}`, boxSizing: 'border-box' }}></div>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 7, flexWrap: 'wrap', marginBottom: 3 }}>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, fontWeight: 700, color: accent }}>{s.time}</span>
                    {s.action && <span style={{ fontSize: 9.5, fontWeight: 800, letterSpacing: '0.03em', color: accent, background: accentBg, padding: '2px 7px', borderRadius: 999, whiteSpace: 'nowrap' }}>{s.action}</span>}
                    {w != null &&
                    <span style={{ marginLeft: 'auto', fontFamily: "'JetBrains Mono', monospace", fontSize: 14, fontWeight: 800, color: ink }}>{w}<span style={{ fontSize: 10, color: muted, marginLeft: 1 }}>g</span></span>
                    }
                  </div>
                  <div style={{ fontSize: 12.5, lineHeight: 1.45, color: ink, fontWeight: 500 }}>{rt(s.note)}</div>
                </div>
              </div>);

          })}
        </div>
      </div>

      {/* Footer */}
      <div style={{ borderTop: `1px solid ${line}`, padding: '14px 24px', display: 'flex', alignItems: 'center', gap: 9, background: paper }}>
        <div style={{ width: 22, height: 22, borderRadius: '50%', background: accent, color: T.footIcon, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <Coffee size={12} strokeWidth={2.4} />
        </div>
        <span style={{ fontSize: 11, fontWeight: 700, color: muted, letterSpacing: '0.02em' }}>{t('card_footer')}</span>
      </div>
    </div>;


  return (
    <div className="fixed inset-0 z-[70] flex items-start justify-center p-4 sm:py-8 bg-black/55 backdrop-blur-sm animate-in fade-in duration-200 overflow-y-auto" onClick={onClose}>
      <div className="flex flex-col items-center gap-4 animate-in zoom-in-95 duration-200" style={{ width: 'min(100%, 360px)' }} onClick={(e) => e.stopPropagation()}>

        {cardEl}

        {/* 操作列（不會被截圖） */}
        <div className="w-full flex items-center gap-3" style={{ maxWidth: 360 }}>
          <button onClick={onClose} className="px-5 py-3.5 rounded-2xl bg-white/15 text-white text-sm font-bold backdrop-blur-sm hover:bg-white/25 active:scale-[0.98] transition-all outline-none">{t('summary_close')}</button>
          <button onClick={saveImage} disabled={busy} className="flex-1 flex items-center justify-center gap-2 px-5 py-3.5 rounded-2xl bg-white text-[#2F2D2A] text-sm font-black shadow-lg hover:opacity-90 active:scale-[0.98] transition-all outline-none disabled:opacity-70">
            {busy ? <span className="w-4 h-4 border-2 border-[#2F2D2A]/30 border-t-[#2F2D2A] rounded-full animate-spin"></span> : <Share size={16} />}
            {busy ? t('card_saving') : t('card_save')}
          </button>
        </div>
        <p className="text-center text-[11px] text-white/70 font-medium -mt-1">{t('card_hint')}</p>
      </div>
    </div>);

}

// ==========================================
// 11. BrewRecipeDetail (沖煮參數主模組)
// ==========================================
function BrewRecipeDetail({ recipe, GRINDER_DATABASE, customWeight, setCustomWeight, t, c, lang, nameEn, dripperName }) {
  const classes = useClasses(c);
  const ratio = customWeight / recipe.baseCoffee || 1;
  const isIced = recipe.drinkType === 'iced';
  const maxWater = Math.max(...recipe.steps.map((s) => s.water || 0));
  const baseRatio = (maxWater / recipe.baseCoffee).toFixed(1).replace('.0', '');
  const renderDynamicText = (textObj) => typeof textObj === 'function' ? textObj(ratio) : textObj;
  const grindLabel = recipe.baseGrind && GRINDER_DATABASE[recipe.baseGrind.grinder] ? `${GRINDER_DATABASE[recipe.baseGrind.grinder].name} · ${recipe.baseGrind.val}` : '';

  const [elapsed, setElapsed] = useState(0);
  const [isRunning, setIsRunning] = useState(false);
  const [showTroubleshoot, setShowTroubleshoot] = useState(false);
  const holdMinus = useHold();
  const holdPlus = useHold();
  const [showSummary, setShowSummary] = useState(false);
  const [showCard, setShowCard] = useState(false);
  const wakeSupported = typeof navigator !== 'undefined' && 'wakeLock' in navigator;
  const [keepAwake, setKeepAwake] = useState(() => {
    try {return localStorage.getItem('keepAwake') !== '0';} catch (e) {return true;}
  });
  useEffect(() => {try {localStorage.setItem('keepAwake', keepAwake ? '1' : '0');} catch (e) {}}, [keepAwake]);

  const stepRefs = useRef([]);
  const wakeLockRef = useRef(null);

  useEffect(() => {let interval;if (isRunning) interval = setInterval(() => setElapsed((e) => e + 1), 1000);return () => clearInterval(interval);}, [isRunning]);
  useEffect(() => {setElapsed(0);setIsRunning(false);setShowTroubleshoot(false);}, [recipe.id]);



  const formatTime = (secs) => {const m = Math.floor(secs / 60);const s = secs % 60;return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;};

  const stepStartTimes = useMemo(() => {
    const times = recipe.steps.map((s) => {const m = s.time.match(/(\d+):(\d+)/);return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : -1;});
    for (let i = 1; i < times.length; i++) {if (times[i] === -1) times[i] = times[i - 1] + 30;}return times;
  }, [recipe]);

  const activeStepIndex = useMemo(() => {if (elapsed === 0 && !isRunning) return -1;let idx = 0;for (let i = 0; i < stepStartTimes.length; i++) {if (elapsed >= stepStartTimes[i]) idx = i;}return idx;}, [elapsed, isRunning, stepStartTimes]);

  useEffect(() => {
    if (!keepAwake || !wakeSupported) return undefined;
    let released = false;
    const requestWakeLock = async () => {
      try {
        wakeLockRef.current = await navigator.wakeLock.request('screen');
        wakeLockRef.current.addEventListener('release', () => {});
      } catch (err) {
        console.log('Wake Lock Error:', err);
      }
    };
    requestWakeLock();

    const handleVisibilityChange = () => {
      if (!released && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);

    return () => {
      released = true;
      document.removeEventListener('visibilitychange', handleVisibilityChange);
      if (wakeLockRef.current) {
        try { wakeLockRef.current.release(); } catch (e) {}
        wakeLockRef.current = null;
      }
    };
  }, [keepAwake, wakeSupported]);

  useEffect(() => {
    if (isRunning && activeStepIndex >= 0 && stepRefs.current[activeStepIndex]) {
      const el = stepRefs.current[activeStepIndex];
      const rect = el.getBoundingClientRect();
      const absoluteY = window.scrollY + rect.top;
      const target = absoluteY - (window.innerHeight / 2) + (rect.height / 2);
      window.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
    }
  }, [activeStepIndex, isRunning]);

  return (
    <div className="space-y-4">
        {/* 重量計算卡片 */}
        <div className={`${classes.card} p-6 flex flex-col items-center justify-center relative overflow-hidden`}>
            <div className={`absolute top-0 left-0 w-1.5 h-full ${isIced ? c.blue : c.secondary}`}></div>
            <p className={`text-sm font-bold ${c.textDark} mb-5 flex items-center gap-2`}>{t('auto_calc_title')} <Droplets size={18} className={isIced ? c.blueText : c.secondaryText} /></p>
            <div className="flex items-center gap-3 sm:gap-6">
                {/* 減號按鈕改為 0.5g 級距，支援長按連續遞減 */}
                <button
                    onClick={() => setCustomWeight((w) => Math.max(1, w - 0.5))}
                    onMouseDown={() => holdMinus.start(() => setCustomWeight((w) => Math.max(1, w - 0.5)))}
                    onMouseUp={holdMinus.stop} onMouseLeave={holdMinus.stop}
                    onTouchStart={(e) => { e.preventDefault(); holdMinus.start(() => setCustomWeight((w) => Math.max(1, w - 0.5))); }}
                    onTouchEnd={holdMinus.stop}
                    className={`w-12 h-12 sm:w-14 sm:h-14 shrink-0 flex items-center justify-center rounded-full border-2 ${c.border} text-gray-500 hover:opacity-80 active:scale-95 text-2xl font-medium outline-none select-none`}>-</button>
                <div className="relative flex items-baseline">
                    {/* 輸入框寬度加大為 w-32 (手機) 與 w-40 (電腦)，完美容納小數點 */}
                    <input type="number" step="0.5" value={customWeight || ''} onChange={(e) => setCustomWeight(Number(e.target.value))} className={`w-32 sm:w-40 text-center text-5xl sm:text-6xl font-black ${c.textDark} bg-transparent focus:outline-none tracking-tight`} />
                    <span className={`text-lg sm:text-xl font-bold ${c.textMuted} ml-1 shrink-0`}>g</span>
                </div>
                {/* 加號按鈕改為 0.5g 級距，支援長按連續遞增 */}
                <button
                    onClick={() => setCustomWeight((w) => w + 0.5)}
                    onMouseDown={() => holdPlus.start(() => setCustomWeight((w) => w + 0.5))}
                    onMouseUp={holdPlus.stop} onMouseLeave={holdPlus.stop}
                    onTouchStart={(e) => { e.preventDefault(); holdPlus.start(() => setCustomWeight((w) => w + 0.5)); }}
                    onTouchEnd={holdPlus.stop}
                    className={`w-12 h-12 sm:w-14 sm:h-14 shrink-0 flex items-center justify-center rounded-full border-2 ${c.border} text-gray-500 hover:opacity-80 active:scale-95 text-2xl font-medium outline-none select-none`}>+</button>
            </div>
        </div>

        {/* 研磨建議模組 */}
        {recipe.baseGrind &&
      <RecipeGrindSuggestion recipe={recipe} GRINDER_DATABASE={GRINDER_DATABASE} t={t} c={c} lang={lang} />
      }
        {/* 分享此配方 → 產生沖煮小卡 */}
        <button onClick={() => setShowCard(true)} aria-label={t('share_btn')} className={`w-full flex items-center justify-center gap-2 py-3 rounded-2xl ${c.inputBg} border ${c.border} ${c.primaryText} text-sm font-bold hover:opacity-80 active:scale-[0.99] transition-all outline-none`}>
            <Share size={15} />
            {t('share_btn')}
        </button>
        {showCard &&
        <BrewCard recipe={recipe} nameEn={nameEn} dripperName={dripperName} grindLabel={grindLabel} customWeight={customWeight} ratio={ratio} baseRatio={baseRatio} maxWater={maxWater} isIced={isIced} t={t} rt={renderDynamicText} lang={lang} onClose={() => setShowCard(false)} />
        }

        {/* 配方簡介與數據卡片 */}
        <div className={`${classes.card} overflow-hidden`}>
            {recipe.description && <div className={`p-5 text-[13px] sm:text-sm ${c.textDark} leading-relaxed ${c.infoBg} border-b ${c.border} whitespace-pre-wrap`}>{(() => {
                const txt = renderDynamicText(recipe.description);
                const parts = String(txt).split(/(https?:\/\/[^\s]+)/g);
                return parts.map((p, i) => /^https?:\/\//.test(p)
                    ? <a key={i} href={p} target="_blank" rel="noreferrer" className={`underline font-bold ${c.primaryText} break-all hover:opacity-80`}>{p}</a>
                    : <React.Fragment key={i}>{p}</React.Fragment>);
            })()}</div>}
            <div className={`p-4 grid grid-cols-3 gap-2 sm:gap-3 ${c.card}`}>
                <div className={`flex flex-col items-center justify-center gap-1.5 ${c.infoBg} p-3 rounded-xl border border-transparent`}><div className={`p-1.5 rounded-full ${c.iconBg} ${c.redText} shadow-sm mb-1`}><Thermometer size={16} /></div><p className={`text-[10px] uppercase font-bold tracking-wider ${c.textMuted}`}>{t('suggest_temp')}</p><p className={`font-bold text-base ${c.textDark}`}>{recipe.temperature}°C</p></div>
                <div className={`flex flex-col items-center justify-center gap-1.5 ${c.infoBg} p-3 rounded-xl border border-transparent`}><div className={`p-1.5 rounded-full ${c.iconBg} ${c.yellowText} shadow-sm mb-1`}><ScaleIcon size={16} /></div><p className={`text-[10px] uppercase font-bold tracking-wider ${c.textMuted}`}>{t('suggest_weight')}</p><p className={`font-bold text-base ${c.textDark}`}>{recipe.baseCoffee}g</p></div>
                <div className={`flex flex-col items-center justify-center gap-1.5 ${c.infoBg} p-3 rounded-xl border border-transparent`}><div className={`p-1.5 rounded-full ${c.iconBg} ${c.blueText} shadow-sm mb-1`}><Settings2 size={16} /></div><p className={`text-[10px] uppercase font-bold tracking-wider ${c.textMuted}`}>{t('base_ratio')}</p><p className={`font-bold text-base ${c.textDark}`}>1 : {baseRatio}</p></div>
            </div>
        </div>

        {/* 沖煮計時器 (Sticky) */}
        <div className={`sticky top-16 z-30 pt-4 pb-2 ${c.bg}`}>
            <div className={`${classes.card} p-4 flex items-center justify-between shadow-[0_8px_30px_rgb(0,0,0,0.08)]`}>
                <div className="flex items-center gap-3"><button onClick={() => setIsRunning(!isRunning)} className={`w-12 h-12 rounded-full flex items-center justify-center text-white ${isRunning ? c.red : c.primary} shadow-md active:scale-95 transition-all outline-none`}>{isRunning ? <Pause size={24} /> : <Play size={24} className="ml-1" />}</button><button onClick={() => {setElapsed(0);setIsRunning(false);}} className={`w-10 h-10 rounded-full flex items-center justify-center ${c.iconBg} ${c.textMuted} border ${c.border} active:scale-95 transition-all outline-none`}><RotateCcw size={18} /></button>{wakeSupported && <button onClick={() => setKeepAwake((v) => !v)} aria-label={t('keep_awake')} title={t('keep_awake')} className={`h-10 px-3 rounded-full flex items-center gap-1.5 border active:scale-95 transition-all outline-none ${keepAwake ? `${c.primary} text-white border-transparent shadow-sm` : `${c.iconBg} ${c.textMuted} ${c.border}`}`}><Sun size={16} strokeWidth={2.4} /><span className="text-[11px] font-bold hidden min-[360px]:inline">{t('keep_awake')}</span></button>}</div>
                <div className="text-right"><div className={`text-[10px] font-bold ${c.textMuted} uppercase tracking-wider mb-0.5`}>{t('timer_title')}</div><div className={`font-mono text-4xl font-black ${isRunning ? c.primaryText : c.textDark} tracking-widest tabular-nums leading-none`}>{formatTime(elapsed)}</div></div>
            </div>
            {elapsed > 0 &&
            <button onClick={() => setShowSummary(true)} className={`w-full mt-2 py-2.5 rounded-xl ${c.inputBg} border ${c.border} ${c.primaryText} text-sm font-bold flex items-center justify-center gap-2 hover:opacity-80 active:scale-[0.99] transition-all outline-none`}><CheckCircle2 size={16} /> {t('summary_btn')}</button>
            }
        </div>

        {/* 沖煮總結卡（可截圖） */}
        {showSummary &&
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-in fade-in duration-200" onClick={() => setShowSummary(false)}>
            <div className={`${c.card} border ${c.border} rounded-3xl p-6 sm:p-7 max-w-sm w-full shadow-2xl animate-in zoom-in-95 duration-200 relative`} onClick={(e) => e.stopPropagation()}>
                <div className={`absolute top-0 left-0 right-0 h-1.5 rounded-t-3xl ${isIced ? c.blue : c.secondary}`}></div>
                <div className="flex items-start justify-between mb-4 mt-1">
                    <div className="flex items-center gap-2.5">

    if (parsedA < rFirst.min) return { error: `${t('err_low')} ${rFirst.min})`, catIdx: -1 };
    if (parsedA > rLast.max) return { error: `${t('err_high')} ${rLast.max})`, catIdx: -1 };

    if (catIdx === -1) return { error: t('err_match'), catIdx: -1 };

    let valB = rB.min + ratio * (rB.max - rB.min);
    if (gB.step === 1) valB = Math.round(valB);else {let inv = 1.0 / gB.step;valB = Math.round(valB * inv) / inv;valB = parseFloat(valB.toFixed(2));}
    return { valB, catIdx, catName: t('grind_cats_inline')[catIdx] };
  }, [grinderA, grinderB, valA, t, GRINDER_DATABASE]);

  return (
    <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-300">
    <div className="flex flex-col md:flex-row items-center gap-4 relative">
        <div className={`flex-1 w-full ${c.card} p-5 rounded-2xl border border-[#7A93A2]/30 shadow-sm ${c.blue} bg-opacity-5 dark:bg-opacity-10`}>
            <label className={`block text-sm font-bold ${c.blueText} mb-2`}>{t('from_grinder')}</label>
            <div className="relative">
                <select value={grinderA} onChange={(e) => setGrinderA(e.target.value)} className={`${classes.select} focus:ring-[#7A93A2] mb-4 ${grinderA === '' ? 'text-gray-400' : c.textDark}`}>
                    <option value="" disabled>{t('select_grinder_placeholder')}</option>
                    {Object.entries(groups).map(([gn, itms]) => <optgroup key={gn} label={gn} className={`${c.textMuted} font-bold`}>{itms.map((i) => <option key={i.key} value={i.key} className={`${c.textDark} font-medium`}>{i.name}</option>)}</optgroup>)}
                </select>
                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400 mb-4"><ChevronDown size={20} /></div>
            </div>
            <label className={`block text-sm font-bold ${c.blueText} mb-2`}>{t('current_grind')}</label>
            <input type="number" value={valA} onChange={(e) => setValA(e.target.value)} placeholder={t('input_placeholder')} className={`w-full p-3 text-2xl font-black text-center rounded-xl border border-[#7A93A2]/40 ${c.inputBg} ${c.textDark} outline-none focus:ring-2 focus:ring-[#7A93A2]`} />
            <div className={`text-center text-xs font-bold ${c.blueText} opacity-80 mt-2 min-h-[32px] flex items-center justify-center`}>{grinderA ? GRINDER_DATABASE[grinderA].unit : t('unit')}</div>
        </div>
        <button onClick={handleSwap} className={`p-3 ${c.card} border-2 ${c.border} hover:opacity-80 ${c.primaryText} rounded-full shadow-sm transition-all z-10 active:scale-95 group outline-none`}><ArrowRightLeft size={24} className={`group-hover:rotate-180 transition-transform duration-300`} /></button>
        <div className={`flex-1 w-full ${c.card} p-5 rounded-2xl border border-[#B3A394]/30 shadow-sm ${c.secondary} bg-opacity-5 dark:bg-opacity-10`}>
            <label className={`block text-sm font-bold ${c.secondaryText} mb-2`}>{t('to_grinder')}</label>
            <div className="relative">
                <select value={grinderB} onChange={(e) => setGrinderB(e.target.value)} className={`${classes.select} focus:ring-[#B3A394] mb-4 ${grinderB === '' ? 'text-gray-400' : c.textDark}`}>
                    <option value="" disabled>{t('select_grinder_placeholder')}</option>
                    {Object.entries(groups).map(([gn, itms]) => <optgroup key={gn} label={gn} className={`${c.textMuted} font-bold`}>{itms.map((i) => <option key={i.key} value={i.key} className={`${c.textDark} font-medium`}>{i.name}</option>)}</optgroup>)}
                </select>
                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400 mb-4"><ChevronDown size={20} /></div>
            </div>
            <label className={`block text-sm font-bold ${c.secondaryText} mb-2`}>{t('target_grind')}</label>
            <div className={`w-full p-3 text-3xl font-black text-center ${result?.error ? 'text-red-500' : c.secondaryText} ${c.inputBg} rounded-xl border border-[#B3A394]/40 h-[62px] flex items-center justify-center shadow-inner`}>{result ? result.error ? 'N/A' : result.valB : '-'}</div>
            <div className={`text-center text-xs font-bold ${c.secondaryText} opacity-80 mt-2 min-h-[32px] flex items-center justify-center`}>{grinderB ? GRINDER_DATABASE[grinderB].unit : t('unit')}</div>
        </div>
    </div>
    {grinderB && result?.catIdx !== -1 &&
      <div className={`${c.card} p-6 rounded-2xl shadow-sm border ${c.border} animate-in fade-in duration-300`}>
            {result && !result.error && <div className={`text-center text-sm font-bold p-4 ${c.inputBg} rounded-xl border ${c.border} mb-6 ${c.textDark}`}>{t('grind_result_msg')} <strong className={c.primaryText}>{result.catName}</strong>{t('mapped_linear')}</div>}
            {result && result.error && <div className={`text-center text-sm font-bold p-4 ${c.inputBg} rounded-xl border ${c.border} mb-6 text-red-500`}>{result.error}</div>}
            <div className="px-2">
                <div className={`text-xs font-bold ${c.textMuted} mb-3 flex items-center gap-2`}><Settings2 size={16} /> {GRINDER_DATABASE[grinderB].name} {t('grind_visual')}</div>
                <div className={`flex h-4 rounded-full overflow-hidden ${c.bg} shadow-inner border ${c.border}`}>
                    {t('grind_cats').map((cat, idx) => <div key={idx} className={`w-1/5 border-r border-black/5 dark:border-white/10 transition-colors duration-300 ${result && result.catIdx === idx ? c.bar[idx] : 'bg-transparent'}`}></div>)}
                </div>
                <div className={`flex text-[10px] sm:text-xs ${c.textMuted} mt-3 font-bold`}>
                    {t('grind_cats').map((cat, idx) => {
              const range = GRINDER_DATABASE[grinderB].ranges[idx];
              const rangeText = range && range.min !== null ? `${range.min} - ${range.max}` : '-';
              const isHighlight = result && result.catIdx === idx;
              return (
                <div key={idx} className={`w-1/5 flex flex-col items-center gap-1.5 whitespace-pre-wrap ${isHighlight ? c.textDark : ''}`}>
                                <span className="text-center leading-tight">{cat}</span>
                                <span className={`px-1.5 py-0.5 rounded-md font-mono transition-all duration-300 ${isHighlight ? `${c.bar[idx]} text-white shadow-md scale-110` : `${c.inputBg} border ${c.border}`}`}>{rangeText}</span>
                            </div>);

            })}
                </div>
            </div>
            {result && result.catIdx !== -1 && <GrindVisualizer catIdx={result.catIdx} c={c} lang={lang} />}
        </div>
      }
    <div className={`p-5 ${c.infoBg} rounded-2xl border ${c.border} text-[12px] sm:text-[13px] ${c.textMuted} leading-relaxed`}>
        <strong className={`${c.textDark} block mb-2`}>{t('hint_title')}</strong>
        <ul className="list-disc pl-5 space-y-1.5">
            <li>{t('hint_1')}</li><li>{t('hint_2')}</li><li>{t('hint_3')}</li><li>{t('hint_4')}</li>
        </ul>
    </div>
</div>);

}

// ==========================================
// 14. BrewDiagnostics — SCA 金杯萃取診斷
// ==========================================
// 重要：DiagSection 定義在 BrewDiagnostics 外部
// 否則每次 render 都會重新建立內部元件，導致輸入框失焦與滑桿卡頓。
const DiagSection = ({ label, num, c, classes, children, accentColor }) => {
  const ac = accentColor || (c.bg === 'bg-[#1B1E22]' ? '#B0C5B5' : '#5E6F66');
  return (
    <div className={`${classes.card} p-4 sm:p-6 space-y-4`}>
            <div className={`flex items-center justify-between border-b border-dashed ${c.border} pb-3`}>
                <h2 className="text-[11px] font-bold tracking-[0.18em] uppercase flex items-center gap-2" style={{ color: ac }}>
                    <span className="w-2 h-2 rounded-full" style={{ backgroundColor: ac }}></span>{label}
                </h2>
                {num && <span className={`text-[9px] font-mono tracking-[0.2em] ${c.textMuted}`}>{num}</span>}
            </div>
            {children}
        </div>);

};

function BrewDiagnostics({ lang, t, c }) {
  const l = (zh, en, ja) => ({ zh, en, ja })[lang] || zh;
  const classes = useClasses(c);
  const isDark = c.bg === 'bg-[#1A1D1F]';
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  // ===== Brewing Setup =====
  const [dripper, setDripper] = useState('v60');
  const [paper, setPaper] = useState('standard');
  const [grindUm, setGrindUm] = useState(750);
  const [temp, setTemp] = useState(92);
  const [grounds, setGrounds] = useState('15');
  const [ratio, setRatio] = useState(15);
  const [mm, setMm] = useState('2');
  const [ss, setSs] = useState('30');
  const [waterMin, setWaterMin] = useState(150);

  // ===== Measurement =====
  const [mode, setMode] = useState('sensory');
  const [tdsInput, setTdsInput] = useState(1.35);

  // 6 sensory dimensions (1-10)
  const [sAcidity, setSAcidity] = useState(6);
  const [sBitter, setSBitter] = useState(4);
  const [sSweet, setSSweet] = useState(7);
  const [sBody, setSBody] = useState(6);
  const [sAstr, setSAstr] = useState(3);
  const [sAfter, setSAfter] = useState(7);

  // ===== Derived =====
  const gN = parseFloat(grounds) || 0;
  const waterN = gN * ratio;
  const totalSec = (parseInt(mm, 10) || 0) * 60 + (parseInt(ss, 10) || 0);
  const isValid = gN > 0 && ratio > 0 && totalSec > 0;

  // Dripper physical params: LRR g water absorbed per g grounds, drawdown factor
  const dripperMap = {
    v60: { lrr: 1.95, df: 1.00, name: 'Hario V60' },
    kalita: { lrr: 2.00, df: 1.25, name: 'Kalita Wave' },
    origami: { lrr: 1.95, df: 0.90, name: 'Origami' },
    swi: { lrr: 2.10, df: 1.85, name: 'Hario Switch' },
    chemex: { lrr: 1.90, df: 1.15, name: 'Chemex' }
  };
  const dInfo = dripperMap[dripper];
  const paperF = { fast: 0.80, standard: 1.00, slow: 1.35 }[paper];
  const tempF = 1 + (92 - temp) * 0.005;
  const expectedSec = isValid ? 130 * dInfo.df * paperF * Math.pow(gN / 15, 1.2) * Math.pow(750 / grindUm, 1.6) * tempF : 0;
  const dev = expectedSec > 0 ? totalSec / expectedSec : 1;
  const expMin = Math.floor(expectedSec / 60);
  const expSec = Math.round(expectedSec % 60);
  const fmtTime = (m, s) => `${m}:${String(s).padStart(2, '0')}`;

  // Water mineralization influence
  let waterBoost = 0;
  if (waterMin < 30) waterBoost = -0.6;else
  if (waterMin < 70) waterBoost = -0.25;else
  if (waterMin > 250) waterBoost = -0.4;else
  if (waterMin >= 100 && waterMin <= 175) waterBoost = 0.15;

  // EY / TDS
  let ey = 20,tdsCalc = 1.30;
  if (isValid) {
    if (mode === 'refract') {
      const bev = waterN - gN * dInfo.lrr;
      ey = bev > 0 ? tdsInput * bev / gN : 0;
      tdsCalc = tdsInput;
    } else {
      // Physical baseline
      let pEY = 20 + (800 - grindUm) * 0.012 + (temp - 92) * 0.22 + (dev - 1) * 3.5 + waterBoost;
      // Sensory inference
      let sEY = 20;
      sEY += (sBitter - 4) * 0.7;
      sEY += (sAstr - 3) * 0.7;
      sEY += (sAfter - 6) * 0.35;
      if (sSweet < 6) sEY -= (sAcidity - 6) * 0.5;
      sEY += (sSweet - 7) * 0.25;
      ey = clamp(0.45 * pEY + 0.55 * sEY, 12, 26);
      const bev = waterN - gN * dInfo.lrr;
      tdsCalc = bev > 0 ? clamp(ey * gN / bev + (sBody - 6) * 0.04, 0.6, 2.1) : 1.30;
    }
  }
  ey = clamp(ey, 12, 26);
  tdsCalc = clamp(tdsCalc, 0.6, 2.1);

  // ===== Diagnosis =====
  const sigChannel = mode === 'sensory' && sAstr >= 6 && sBitter >= 6 && sAcidity >= 7;
  const sigClog = dev > 1.30 && (mode === 'sensory' ? sAstr >= 5 : ey > 21);
  const sigBypass = dev < 0.75 && tdsCalc < 1.15;
  const sigOver = ey > 22 || mode === 'sensory' && sBitter >= 7 && sAstr >= 5;
  const sigUnder = ey < 18 || mode === 'sensory' && sAcidity >= 7 && sSweet < 6 && sBody < 6;
  const sigWeak = tdsCalc < 1.15 && !sigUnder && !sigBypass;
  const sigStrong = tdsCalc > 1.45 && !sigOver;

  const actualTimeStr = fmtTime(parseInt(mm, 10) || 0, parseInt(ss, 10) || 0);
  const expTimeStr = fmtTime(expMin, expSec);

  let badge,title,summary,sensoryText,actions = [];

  if (!isValid) {
    badge = l('待輸入', 'WAITING', '入力待ち');
    title = l('請完成輸入', 'Complete the inputs', '入力を完了してください');
    summary = l('請輸入完整的粉量、粉水比與沖煮時間。', 'Enter dose, brew ratio and time.', '粉量・比率・時間を入力してください。');
    sensoryText = '';
  } else if (sigChannel) {
    badge = l('通道效應', 'CHANNELING', 'チャネリング');
    title = l('粉床偏流 ── 通道效應', 'Channeling — uneven extraction', 'チャネリング');
    summary = l(
      `酸感、苦感、澀感同時偏高，這是典型的「通道效應」：水流避開粉床密實處，從脆弱處貫穿，導致局部過萃，其餘區域萃取不足。`,
      `Sour, bitter and astringent all high — classic channeling. Water bypasses denser bed and rushes through weak spots.`,
      `酸味と苦み・渋みが同時に高いのは典型的なチャネリングです。`
    );
    sensoryText = l('感官線索：尖酸 + 澀苦同時出現，乾淨度低。', 'Cue: sour + bitter + astringent together; low cleanliness.', '酸+苦+渋が同時、クリーンさ低下。');
    actions = [
    l('改善佈水均勻度：避免衝擊濾紙邊緣，採螺旋式注水或中心緩注。', 'Pour more evenly: avoid hitting filter edges, use spiral pour.', '注湯を均一に：縁を直撃せず、らせん状に。'),
    l(`研磨從 ${grindUm} μm 調粗至 ${grindUm + 80} μm，並嘗試 WDT 攪拌器以減少結團與細粉。`, `Coarsen to ${grindUm + 80} μm and try a WDT tool to break clumps.`, `挽き目を${grindUm + 80} μmへ。WDTでダマと微粉を整える。`),
    l('延長悶蒸至 35-40 秒，確保整層粉床完全潤濕並排出 CO₂。', 'Extend bloom to 35-40s for full saturation and CO₂ release.', '蒸らしを35-40秒に延長。')];

  } else if (sigClog) {
    badge = l('細粉堵塞', 'FINES CLOGGED', '微粉詰まり');
    title = l('細粉沉降 ── 濾孔堵塞與尾段過萃', 'Fines clogging — bed restricted at base', '微粉沈降');
    summary = l(
      `實測 ${actualTimeStr} 比理論預期 ${expTimeStr} 慢 ${Math.round((dev - 1) * 100)}%。細粉沉到濾紙微孔，末段水長時間滯留，溶出較重的多酚與單寧。`,
      `Actual ${actualTimeStr} is ${Math.round((dev - 1) * 100)}% slower than expected ${expTimeStr}. Fines clog the base.`,
      `実測 ${actualTimeStr} が予測 ${expTimeStr} より ${Math.round((dev - 1) * 100)}% 遅い。微粉が底を塞ぐ。`
    );
    sensoryText = l('感官線索：苦尾、澀感持續、口腔乾涸感。', 'Cue: lingering bitter, dry/papery finish.', '余韻に苦渋、口腔の乾燥感。');
    actions = [
    l(`研磨從 ${grindUm} μm 調粗 60-80 μm（至 ${grindUm + 70} μm），降低細粉比例。`, `Coarsen by 60-80 μm (to ${grindUm + 70} μm).`, `挽き目を60-80μm粗く（${grindUm + 70} μm）。`),
    l('注水後段避免大幅搖晃濾杯或高位水柱，防止細粉再度沉降。', 'Avoid swirling or high-pour in late stage.', '後半は撹拌や高所からの注湯を控える。'),
    l(`改用較快流速的濾紙（如 CAFEC Abaca），或切換成「${paper === 'slow' ? '標準' : '快速'}」款。`, `Switch to a faster filter (e.g. CAFEC Abaca).`, `より速いフィルター紙に変更。`)];

  } else if (sigBypass) {
    badge = l('外圍旁路', 'HIGH BYPASS', 'バイパス過多');
    title = l('熱水繞過粉床 ── 極低濃度', 'Bypass — water flows around the bed', 'バイパス過多');
    summary = l(
      `滴濾 ${actualTimeStr} 比預期 ${expTimeStr} 快 ${Math.round((1 - dev) * 100)}%、TDS ${tdsCalc.toFixed(2)}% 偏低。熱水多數從濾紙與濾杯邊緣流走，沒有充分穿過粉粒。`,
      `Drawdown ${Math.round((1 - dev) * 100)}% faster than expected with low TDS. Water escapes between filter and dripper.`,
      `滴下が予測より ${Math.round((1 - dev) * 100)}% 早く、TDSが低い。`
    );
    sensoryText = l('感官線索：水感、體態薄弱、中段甜感稀疏。', 'Cue: thin body, watery, weak mid-palate.', '薄い口当たり、中盤の甘み不足。');
    actions = [
    l(`研磨從 ${grindUm} μm 調細 80 μm（至 ${grindUm - 80} μm），提高粉床阻力。`, `Tighten grind by 80 μm (to ${grindUm - 80} μm).`, `挽き目を80μm細かく（${grindUm - 80} μm）。`),
    l('改用細口手沖壺、放慢注水流速；避免水柱漫過粉床邊緣。', 'Use a gooseneck and slower pour; don\'t overshoot the rim.', '細口ポットでゆっくり注ぐ。'),
    l(`縮短粉水比從 1:${ratio.toFixed(1)} 至 1:${(ratio - 1).toFixed(1)}，拉高濃度。`, `Tighten ratio from 1:${ratio.toFixed(1)} to 1:${(ratio - 1).toFixed(1)}.`, `比率を縮める：1:${ratio.toFixed(1)} → 1:${(ratio - 1).toFixed(1)}。`)];

  } else if (sigOver) {
    badge = l('萃取過度', 'OVER-EXTRACTED', '過抽出');
    title = l('大分子物質溶出過度', 'Over-extracted', 'オーバー抽出');
    const reason = ey > 22 ? `EY ${ey.toFixed(1)}% 超出 SCA 22% 上限` : '感官顯示苦澀並存';
    summary = l(
      `${reason}。在 ${temp}°C 與 ${grindUm} μm 下，水粉接觸過深，將後段多酚、奎寧酸與生物鹼一併溶出。`,
      `${ey > 22 ? 'EY ' + ey.toFixed(1) + '% above SCA 22%' : 'Sensory shows bitter + astringent'}. Late-stage compounds being extracted.`,
      `過抽出を示唆。後半の多酚・キナ酸まで溶出。`
    );
    sensoryText = l('感官線索：藥苦、炭焦、口乾、香氣壓抑。', 'Cue: medicinal bitterness, smoky, drying, muted aroma.', '苦み・焦げ感・渋み・香りの鈍さ。');
    actions = [
    l(`水溫從 ${temp}°C 降至 ${Math.max(83, temp - 3)}°C，抑制大分子水解。`, `Lower temp from ${temp}°C to ${Math.max(83, temp - 3)}°C.`, `湯温を${temp}°C→${Math.max(83, temp - 3)}°Cに。`),
    l(`研磨從 ${grindUm} μm 調粗 80 μm（至 ${grindUm + 80} μm）。`, `Coarsen from ${grindUm} to ${grindUm + 80} μm.`, `挽き目を${grindUm + 80} μmへ粗く。`),
    l(`拉開粉水比從 1:${ratio.toFixed(1)} 至 1:${(ratio + 1).toFixed(1)}，稀釋萃取。`, `Open ratio from 1:${ratio.toFixed(1)} to 1:${(ratio + 1).toFixed(1)}.`, `比率を広げる：1:${(ratio + 1).toFixed(1)}。`)];

  } else if (sigUnder) {
    badge = l('萃取不足', 'UNDER-EXTRACTED', '抽出不足');
    title = l('溶出能量不足', 'Under-extracted', 'アンダー抽出');
    const reason = ey < 18 ? `EY ${ey.toFixed(1)}% 低於 SCA 18%` : '感官顯示尖酸與甜感不足';
    summary = l(
      `${reason}。在 ${temp}°C 下水分子能量不足，中後段醣類與焦糖反應物未充分溶出。`,
      `${ey < 18 ? 'EY ' + ey.toFixed(1) + '% below SCA 18%' : 'Sensory shows sour with low sweetness'}. Sugars are trapped.`,
      `溶出が遅れ、甘み成分が未抽出。`
    );
    sensoryText = l('感官線索：尖酸、口感單薄、餘韻短促。', 'Cue: sharp sour, thin body, short finish.', '鋭い酸・薄いボディ・短い余韻。');
    actions = [
    l(`水溫從 ${temp}°C 提升至 ${Math.min(96, temp + 3)}°C，加速擴散。`, `Raise temp from ${temp}°C to ${Math.min(96, temp + 3)}°C.`, `湯温を${temp}°C→${Math.min(96, temp + 3)}°Cに。`),
    l(`研磨從 ${grindUm} μm 調細 60 μm（至 ${grindUm - 60} μm），擴大表面積。`, `Tighten grind by 60 μm to ${grindUm - 60} μm.`, `挽き目を60μm細かく（${grindUm - 60} μm）。`),
    l('延長悶蒸至 30-40 秒、注水節奏放慢以增加接觸時間。', 'Extend bloom to 30-40s and pour slower.', '蒸らしを30-40秒に延長。')];

  } else if (sigWeak) {
    badge = l('濃度偏低', 'LOW STRENGTH', '濃度不足');
    title = l('TDS 偏低 ── 杯感過於稀薄', 'Low TDS — brew tastes watery', 'TDS低');
    summary = l(
      `EY ${ey.toFixed(1)}% 在合理範圍但 TDS ${tdsCalc.toFixed(2)}% 低於 1.15%。萃取本身沒問題，但濃度被粉水比稀釋了。`,
      `EY ${ey.toFixed(1)}% is fine but TDS ${tdsCalc.toFixed(2)}% is below 1.15%. Extraction OK, ratio too open.`,
      `EYは妥当だがTDSが低い。比率が広すぎ。`
    );
    sensoryText = l('感官線索：口感薄、咖啡感不足。', 'Cue: thin in the mouth, lacks coffee character.', '薄い口当たり、コーヒー感不足。');

function App() {
  const initialRoute = (() => {
    try {
      const p = new URLSearchParams(window.location.search);
      if (p.get('d') || p.get('r')) return { view: 'brew', d: p.get('d') || '', r: p.get('r') || null, g: p.get('g') || null };
    } catch (e) {}
    return null;
  })();
  const [view, setView] = useState(initialRoute ? initialRoute.view : 'home');const [lang, setLang] = useState('zh');
  const [isDark, setIsDark] = useState(() => { try { const s = localStorage.getItem('coffee_theme'); if (s === 'dark') return true; if (s === 'light') return false; return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; } catch (e) { return false; } });
  const t = (k) => i18n[lang][k] || k;const c = getColors(isDark);
  useEffect(() => {document.body.className = c.bg;}, [isDark, c.bg]);
  // 深色模式：記住使用者選擇，並在未手動設定時跟隨系統
  useEffect(() => { try { localStorage.setItem('coffee_theme', isDark ? 'dark' : 'light'); } catch (e) {} }, [isDark]);
  useEffect(() => {
    if (!window.matchMedia) return undefined;
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const handler = (e) => { try { if (!localStorage.getItem('coffee_theme_manual')) setIsDark(e.matches); } catch (err) {} };
    mq.addEventListener && mq.addEventListener('change', handler);
    return () => { mq.removeEventListener && mq.removeEventListener('change', handler); };
  }, []);
  const toggleDark = () => { setIsDark((v) => !v); try { localStorage.setItem('coffee_theme_manual', '1'); } catch (e) {} };

  // 新增：只要切換頁面 (view 改變)，就自動將畫面捲動回最上方，解決手機版停留在底部的問題
  useEffect(() => {window.scrollTo(0, 0);}, [view]);

  return (
    <div className={`min-h-screen ${c.bg} font-sans ${c.textDark} pb-20 selection:bg-[#B3A394] selection:text-white transition-colors duration-300`}>
    <button onClick={toggleDark} className={`fixed bottom-6 right-6 z-50 p-3.5 rounded-full paper-card border ${c.border} ${c.card} ${c.textDark} hover:scale-110 active:scale-95 transition-all duration-300 outline-none`}>{isDark ? <Sun size={22} /> : <Moon size={22} />}</button>
    <div className={`${c.card} ${c.textDark} border-b ${c.border} sticky top-0 z-40 transition-colors duration-300 backdrop-blur-md bg-opacity-90`}><div className="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between"><div className="flex items-center gap-3">{view !== 'home' && <button onClick={() => setView('home')} className={`p-2 -ml-2 rounded-full hover:${c.inputBg} transition-colors outline-none ${c.textMuted}`}><ArrowLeft size={20} /></button>}<div className={`p-2 rounded-full ${c.primary} text-white`}><Coffee size={18} strokeWidth={2.2} /></div><h1 className={`text-base sm:text-lg font-bold tracking-wide ${c.textDark} hidden sm:block`}>{view === 'home' ? t('app_title') : view === 'brew' ? t('tool_brew_title') : view === 'water' ? t('tool_water_title') : view === 'diag' ? t('tool_diag_title') : t('tool_grind_title')}</h1></div><div className={`flex items-center ${c.inputBg} p-1 rounded-full border ${c.border}`}><button onClick={() => setLang('zh')} className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all outline-none ${lang === 'zh' ? `${c.primary} text-white shadow-sm` : `${c.textMuted} hover:${c.textDark}`}`}>中</button><button onClick={() => setLang('en')} className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all outline-none ${lang === 'en' ? `${c.primary} text-white shadow-sm` : `${c.textMuted} hover:${c.textDark}`}`}>EN</button><button onClick={() => setLang('ja')} className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all outline-none ${lang === 'ja' ? `${c.primary} text-white shadow-sm` : `${c.textMuted} hover:${c.textDark}`}`}>JA</button></div></div></div>
    <main className="max-w-3xl mx-auto px-4 py-8 sm:py-10 relative">{view === 'home' ? <HomeView setView={setView} t={t} c={c} /> : view === 'brew' ? <BrewTool lang={lang} t={t} c={c} initial={initialRoute} /> : view === 'grind' ? <GrindTool lang={lang} t={t} c={c} /> : view === 'diag' ? <BrewDiagnostics lang={lang} t={t} c={c} /> : <WaterTool lang={lang} c={c} />}</main>
</div>);

}

                                {idx === 0 && <span className={`text-[9px] font-bold tracking-widest uppercase ${c.primaryText} ${c.inputBg} border ${c.border} px-2 py-0.5 rounded-full ml-auto self-start sm:self-auto`}>Latest</span>}
                            </div>
                            <ul className={`text-[12px] ${c.textDark} space-y-1.5 leading-relaxed font-medium`}>{log.changes.map((change, i) => <li key={i} className="flex gap-2"><span className={`mt-1.5 w-1 h-1 rounded-full ${c.accent} shrink-0`}></span><span>{change}</span></li>)}</ul>
                        </div>
            )}
                </div>
            </div>
        }
    </div>
</div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
