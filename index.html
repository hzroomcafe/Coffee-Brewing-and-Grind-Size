// 4. 研磨顆粒模擬視覺化 (GrindVisualizer)
// ==========================================
function GrindVisualizer({ catIdx, c, lang }) {
const l = (zh, en, ja) => ({ zh, en, ja }[lang] || zh);
const [scale, setScale] = useState(1);
const pxPerMm = 3.779527559 * scale;

        const visualData = [
            { micron: "200 - 300 μm", mean: 250, texture: l("麵粉狀 / 糖粉", "Powder / Sugar", "パウダー"), finesRatio: 0.15 },
            { micron: "300 - 500 μm", mean: 400, texture: l("細鹽狀", "Fine Salt", "細かい塩"), finesRatio: 0.15 },
            { micron: "500 - 800 μm", mean: 650, texture: l("細砂糖", "Caster Sugar", "グラニュー糖"), finesRatio: 0.2 },
            { micron: "800 - 1200 μm", mean: 1000, texture: l("粗砂", "Coarse Sand", "粗糖 / 粗砂"), finesRatio: 0.2 },
            { micron: "1200 - 1500+ μm", mean: 1350, texture: l("粗鹽 / 碎胡椒", "Coarse Salt", "粗塩 / 砕いた黒胡椒"), finesRatio: 0.25 }
        ];

        const current = visualData[catIdx] || visualData[3];

        const particles = React.useMemo(() => {
            const meanArea = Math.pow(current.mean / 1000, 2);
            const count = Math.max(20, Math.min(250, Math.floor((1600 * 0.18) / (meanArea * 1.35))));
            const colors = ['#3E2723', '#4E342E', '#5D4037', '#6D4C41', '#795548', '#8D6E63'];

            return Array.from({ length: count }).map((_, i) => {
                const isFine = Math.random() < current.finesRatio;
                const baseUm = isFine ? 150 + Math.random() * 150 : current.mean * (0.8 + Math.random() * 0.5);
                const sizeMm = (baseUm * 1.35) / 1000;
                const points = [];
                const numPoints = 6 + Math.floor(Math.random() * 4); 
                for(let j = 0; j < numPoints; j++) {
                    const angle = (j / numPoints) * Math.PI * 2;
                    const r = 30 + Math.random() * 20; 
                    points.push(`${50 + r * Math.cos(angle)}% ${50 + r * Math.sin(angle)}%`);
                }
                const rDist = Math.random() * 40; 
                const theta = Math.random() * 2 * Math.PI;
                return {
                    id: i, sizeMm: sizeMm, color: colors[Math.floor(Math.random() * colors.length)],
                    clipPath: `polygon(${points.join(', ')})`, rot: Math.random() * 360, left: `${50 + rDist * Math.cos(theta)}%`, top: `${50 + rDist * Math.sin(theta)}%`,
                    opacity: isFine ? 0.75 : 0.95
                };
            });
        }, [catIdx, current]);

        return (
            <div className={`mt-6 pt-5 border-t border-dashed ${c.border} flex flex-col items-center animate-in fade-in duration-500`}>
                <div className="flex flex-col items-center gap-2 mb-6 w-full">
                    <span className={`text-sm font-bold ${c.textDark}`}>🔬 {l('實體比例顯微鏡 (1:1)', 'Real Scale View (1:1)', '実寸顕微鏡')}</span>
                    <div className={`mt-2 flex flex-col items-center p-3 rounded-xl ${c.inputBg} border ${c.border} w-full max-w-[320px]`}>
                        <label className={`text-[11px] font-bold ${c.primaryText} mb-2 text-center`}>{l('📐 調整滑桿讓下方線段與實體 1cm 等長', '📐 Adjust slider to match 1cm ruler', '📐 定規で実際の1cmに調整')}</label>
                        <div className="flex items-center gap-3 w-full px-2">
                            <button onClick={() => setScale(Math.max(0.5, scale - 0.05))} className={`w-7 h-7 rounded-full bg-white dark:bg-[#2A2E32] border ${c.border} text-gray-500 shadow-sm font-medium`}>-</button>
                            <input type="range" min="0.5" max="2.5" step="0.01" value={scale} onChange={(e) => setScale(Number(e.target.value))} className="flex-1 accent-[#7E8D85]" />
                            <button onClick={() => setScale(Math.min(2.5, scale + 0.05))} className={`w-7 h-7 rounded-full bg-white dark:bg-[#2A2E32] border ${c.border} text-gray-500 shadow-sm font-medium`}>+</button>
                        </div>
                        {scale !== 1 && <button onClick={() => setScale(1)} className={`mt-2 text-[10px] ${c.textMuted} hover:${c.textDark} underline`}>{l('重設比例', 'Reset Scale', 'リセット')}</button>}
                    </div>
                </div>
                <div className="relative flex flex-col items-center">
                    <div className={`relative shrink-0 rounded-full border-4 border-[#E2DED3] dark:border-[#5B6B61] bg-[#F9F8F6] dark:bg-[#EAE5D9] shadow-inner overflow-hidden z-10 transition-colors duration-500`} style={{ width: `${40 * pxPerMm}px`, height: `${40 * pxPerMm}px` }}>
                        {particles.map(p => (<div key={p.id} className="absolute" style={{ width: `${p.sizeMm * pxPerMm}px`, height: `${p.sizeMm * pxPerMm}px`, left: p.left, top: p.top, backgroundColor: p.color, opacity: p.opacity, clipPath: p.clipPath, transform: `translate(-50%, -50%) rotate(${p.rot}deg)` }}></div>))}
                    </div>
                    <div className="mt-5 flex flex-col items-center">
                        <div className="flex items-end justify-between border-b-2 border-x-2 border-gray-800 dark:border-gray-500" style={{ width: `${10 * pxPerMm}px`, height: '8px' }}></div>
                        <span className={`text-[11px] font-black font-mono mt-1.5 ${c.textDark}`}>10 mm (1 cm)</span>
                    </div>
                </div>
                <div className="text-center mt-6">
                    <p className={`text-xl font-black font-mono ${c.textDark} tracking-widest`}>{current.micron}</p>
                    <p className={`text-sm font-bold ${c.primaryText} mt-1.5`}>{current.texture}</p>
                </div>
            </div>
        );
    }

                            </button>
                            {isSelectorOpen && (
                                <div className={`absolute top-full left-0 right-0 mt-2 ${c.card} border ${c.border} rounded-2xl shadow-xl overflow-hidden animate-in slide-in-from-top-2 duration-200 max-h-[60vh] overflow-y-auto no-scrollbar`}>
                                    <div className={`p-2 ${c.inputBg} border-b ${c.border}`}><p className={`text-xs font-bold ${c.textMuted} px-2 py-1`}>{t('available_recipes')} ({filteredRecipes.length})</p></div>
                                    {filteredRecipes.map(recipe => (
                                        <button key={recipe.id} onClick={() => handleSelectRecipe(recipe)} className={`w-full text-left p-4 border-b last:border-0 ${c.border} hover:bg-black/5 dark:hover:bg-white/5 transition-colors flex items-center justify-between ${selectedRecipe?.id === recipe.id ? c.infoBg : c.card}`}>
                                            <div className="flex items-center gap-3">{recipe.drinkType === 'iced' ? <Snowflake size={18} className={c.icedIcon} /> : <Flame size={18} className={c.hotIcon} />}<div><div className={`font-bold ${c.textDark}`}>{recipe.name}</div>{recipe.author && <div className={`text-xs ${c.textMuted} mt-0.5`}>by {recipe.author}</div>}</div></div>
                                            {selectedRecipe?.id === recipe.id && <CheckCircle2 size={20} className={c.primaryText} />}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                        {selectedRecipe ? (
                            <div className={`transition-opacity duration-300 ${isSelectorOpen ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}><BrewRecipeDetail recipe={selectedRecipe} customWeight={customWeight} setCustomWeight={setCustomWeight} t={t} c={c} lang={lang} /></div>
                        ) : (
                            <div className={`text-center py-10 animate-in fade-in duration-300 ${isSelectorOpen ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}><div className={`w-12 h-12 mx-auto ${c.infoBg} rounded-full flex items-center justify-center mb-3 ${c.secondaryText}`}><Coffee size={24} /></div><p className={`text-sm font-bold ${c.textMuted}`}>{t('select_recipe_prompt')}</p></div>
                        )}
                    </div>
                ) : (
                    <div className={`${c.card} rounded-2xl shadow-sm border ${c.border} p-12 text-center animate-in fade-in duration-300`}><div className={`w-16 h-16 mx-auto ${c.infoBg} rounded-full flex items-center justify-center mb-4 ${c.secondaryText}`}><Coffee size={32} /></div><h3 className={`text-lg font-bold ${c.textDark} mb-1`}>{t('no_recipe_title')}</h3><p className={`text-sm ${c.textMuted}`}>{t('no_recipe_desc')}</p></div>
                )}
            </div>
        );
    }

    function BrewRecipeDetail({ recipe, customWeight, setCustomWeight, t, c, lang }) {
        const ratio = (customWeight / recipe.baseCoffee) || 1;
        const isIced = recipe.drinkType === 'iced';
        const maxWater = Math.max(...recipe.steps.map(s => s.water || 0));
        const baseRatio = (maxWater / recipe.baseCoffee).toFixed(1).replace('.0', '');
        const renderDynamicText = (textObj) => typeof textObj === 'function' ? textObj(ratio) : textObj;

        const [elapsed, setElapsed] = useState(0);
        const [isRunning, setIsRunning] = useState(false);

        useEffect(() => {
            let interval;
            if (isRunning) interval = setInterval(() => setElapsed(e => e + 1), 1000);
            return () => clearInterval(interval);
        }, [isRunning]);

        useEffect(() => { setElapsed(0); setIsRunning(false); }, [recipe.id]);

        const formatTime = (secs) => {
            const m = Math.floor(secs / 60); const s = secs % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        const stepStartTimes = useMemo(() => {
            const times = recipe.steps.map(s => {
                const m = s.time.match(/(\d+):(\d+)/);
                return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : -1;
            });
            for(let i = 1; i < times.length; i++) {
                if(times[i] === -1) times[i] = times[i-1] + 30; 
            }
            return times;
        }, [recipe]);

        const activeStepIndex = useMemo(() => {
            if (elapsed === 0 && !isRunning) return -1; 
            let idx = 0;
            for(let i = 0; i < stepStartTimes.length; i++) {
                if (elapsed >= stepStartTimes[i]) idx = i;
            }
            return idx;
        }, [elapsed, isRunning, stepStartTimes]);

        return (
            <div className="space-y-4">
                <div className={`${c.card} rounded-2xl shadow-sm border ${c.border} p-6 flex flex-col items-center justify-center relative overflow-hidden`}>
                    <div className={`absolute top-0 left-0 w-1.5 h-full ${isIced ? c.blue : c.secondary}`}></div>
                    <p className={`text-sm font-bold ${c.textDark} mb-5 flex items-center gap-2`}>
                        {t('auto_calc_title')} <Droplets size={18} className={isIced ? c.blueText : c.secondaryText}/>
                    </p>
                    <div className="flex items-center gap-6">
                        <button onClick={() => setCustomWeight(Math.max(1, customWeight - 1))} className={`w-14 h-14 flex items-center justify-center rounded-full border-2 ${c.border} text-gray-500 hover:opacity-80 active:scale-95 text-2xl font-medium transition-all`}>-</button>
                        <div className="relative flex items-baseline">
                            <input type="number" value={customWeight || ''} onChange={(e) => setCustomWeight(Number(e.target.value))} className={`w-24 text-center text-6xl font-black ${c.textDark} bg-transparent focus:outline-none`} />
                            <span className={`text-xl font-bold ${c.textMuted} ml-1`}>g</span>
                        </div>
                        <button onClick={() => setCustomWeight(customWeight + 1)} className={`w-14 h-14 flex items-center justify-center rounded-full border-2 ${c.border} text-gray-500 hover:opacity-80 active:scale-95 text-2xl font-medium transition-all`}>+</button>
                    </div>
                </div>

                <div className={`${c.card} rounded-2xl shadow-sm border ${c.border} overflow-hidden`}>
                    {recipe.description && (
                        <div className={`p-5 text-[13px] sm:text-sm ${c.textDark} leading-relaxed ${c.infoBg} border-b ${c.border} whitespace-pre-wrap`}>{renderDynamicText(recipe.description)}</div>
                    )}
                    <div className={`p-4 grid grid-cols-3 gap-2 sm:gap-3 ${c.card}`}>
                        <div className={`flex flex-col items-center justify-center gap-1.5 ${c.infoBg} p-3 rounded-xl border border-transparent`}>
                            <div className={`p-1.5 rounded-full ${c.iconBg} ${c.redText} shadow-sm mb-1`}><Thermometer size={16} /></div>
                            <p className={`text-[10px] uppercase font-bold tracking-wider ${c.textMuted}`}>{t('suggest_temp')}</p>
                            <p className={`font-bold text-base ${c.textDark}`}>{recipe.temperature}°C</p>
                        </div>
                        <div className={`flex flex-col items-center justify-center gap-1.5 ${c.infoBg} p-3 rounded-xl border border-transparent`}>
                            <div className={`p-1.5 rounded-full ${c.iconBg} ${c.yellowText} shadow-sm mb-1`}><ScaleIcon size={16} /></div>
                            <p className={`text-[10px] uppercase font-bold tracking-wider ${c.textMuted}`}>{t('suggest_weight')}</p>
                            <p className={`font-bold text-base ${c.textDark}`}>{recipe.baseCoffee}g</p>
                        </div>
                        <div className={`flex flex-col items-center justify-center gap-1.5 ${c.infoBg} p-3 rounded-xl border border-transparent`}>
                            <div className={`p-1.5 rounded-full ${c.iconBg} ${c.blueText} shadow-sm mb-1`}><Settings2 size={16} /></div>
                            <p className={`text-[10px] uppercase font-bold tracking-wider ${c.textMuted}`}>{t('base_ratio')}</p>
                            <p className={`font-bold text-base ${c.textDark}`}>1 : {baseRatio}</p>
                        </div>
                    </div>
                </div>

                <div className={`sticky top-16 z-30 pt-4 pb-2 ${c.bg}`}>
                    <div className={`${c.card} rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border ${c.border} p-4 flex items-center justify-between`}>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsRunning(!isRunning)} className={`w-12 h-12 rounded-full flex items-center justify-center text-white ${isRunning ? c.red : c.primary} shadow-md active:scale-95 transition-all`}>
                                {isRunning ? <Pause size={24}/> : <Play size={24} className="ml-1"/>}
                            </button>
                            <button onClick={() => { setElapsed(0); setIsRunning(false); }} className={`w-10 h-10 rounded-full flex items-center justify-center ${c.iconBg} ${c.textMuted} border ${c.border} active:scale-95 transition-all hover:bg-black/5 dark:hover:bg-white/5`}>
                                <RotateCcw size={18}/>
                            </button>
                        </div>
                        <div className="text-right">
                            <div className={`text-[10px] font-bold ${c.textMuted} uppercase tracking-wider mb-0.5`}>{t('timer_title')}</div>
                            <div className={`font-mono text-4xl font-black ${isRunning ? c.primaryText : c.textDark} tracking-widest tabular-nums leading-none`}>{formatTime(elapsed)}</div>
                        </div>
                    </div>
                </div>

                <div className={`${c.card} rounded-2xl shadow-sm border ${c.border} p-5 pb-6`}>
                    <h3 className={`text-lg font-bold ${c.textDark} mb-6 flex items-center gap-2 pb-3 border-b ${c.border}`}>
                        <Clock size={20} className={c.primaryText}/> {t('brew_steps')}
                        {ratio !== 1 && <span className={`ml-auto text-xs font-bold text-white ${c.secondary} px-2 py-1 rounded-md`}>{t('converted_ratio')} {(ratio * 100).toFixed(0)}%</span>}
                    </h3>
                    
                    <div className={`relative border-l-2 ${c.border} ml-4 space-y-8 pb-4 mt-4`}>
                        {recipe.steps.map((step, index) => {
                            const scaledWater = step.water !== null ? Math.round(step.water * ratio) : null;
                            const isTextTime = isNaN(parseInt(step.time.charAt(0))) || step.time.length > 5; 
                            const isActive = activeStepIndex === index;
                            const isPast = activeStepIndex > index;
                            const isUpcoming = activeStepIndex < index && activeStepIndex !== -1;

                            return (
                                <div key={step.id || index} className={`relative pl-8 transition-all duration-500 ${isActive ? 'opacity-100 z-10' : (isPast ? 'opacity-30' : (isUpcoming ? 'opacity-50' : 'opacity-100'))}`}>
                                    <div className={`absolute -left-[9px] ${isActive ? 'top-1/2 -translate-y-1/2' : 'top-3'} w-4 h-4 rounded-full border-2 ${c.card} ${isActive ? (isIced ? c.blue : c.yellow) + ' shadow-md scale-125' : (step.water ? (isIced ? c.blue : c.yellow) : c.secondary)} transition-all duration-500`}></div>
                                    <div className={`flex justify-between items-center rounded-2xl transition-all duration-500 ${isActive ? `p-4 -ml-3 -mr-2 shadow-[0_4px_20px_rgba(0,0,0,0.06)] dark:shadow-[0_4px_20px_rgba(0,0,0,0.4)] border-y border-r border-l-4 ${isIced ? c.activeIcedBorder : c.activeHotBorder} ${isIced ? c.activeIcedBg : c.activeHotBg} scale-[1.02] transform-gpu` : 'py-2 border border-transparent'}`}>
                                        <div className="flex-1 pr-3">
                                            <div className="flex items-center flex-wrap gap-2 mb-1.5">
                                                <span className={`font-mono font-black ${isTextTime ? 'text-[0.95rem]' : 'text-[1.1rem]'} ${isActive ? (isIced ? c.blueText : c.yellowText) : c.textDark} transition-colors`}>{step.time}</span>
                                                {step.action && <span className={`text-[11px] px-2 py-0.5 rounded-md ${isIced ? c.icedTag : c.hotTag} font-bold whitespace-nowrap`}>{step.action}</span>}
                                            </div>
                                            <p className={`text-sm ${isActive ? c.activeText : c.textDark} leading-relaxed ${isActive ? 'font-bold' : 'font-medium'} transition-colors`}>{renderDynamicText(step.note)}</p>
                                        </div>
                                        {scaledWater !== null && (
                                            <div className={`text-right shrink-0 px-4 py-2 rounded-xl border ${isActive ? `${c.card} border-transparent shadow-sm` : `${c.inputBg} ${c.border}`} min-w-[70px] transition-colors`}>
                                                <div className={`text-2xl font-black ${isIced ? c.blueText : c.yellowText} leading-none`}>{scaledWater}<span className="text-sm font-bold ml-0.5 text-gray-500">g</span></div>
                                                {ratio !== 1 && <div className={`text-[10px] text-gray-400 mt-1 font-bold`}>({t('original_water')} {step.water}g)</div>}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
        );
    }

    // ==========================================
    // 7. GrindTool (刻度轉換)
    // ==========================================
    function GrindTool({ lang, t, c }) {
        const { GRINDER_DATABASE } = useDatabases(lang);
        const [grinderA, setGrinderA] = useState('');
        const [grinderB, setGrinderB] = useState('');
        const [valA, setValA] = useState('');

        const groups = useMemo(() => {
            let grps = {};
            Object.entries(GRINDER_DATABASE).forEach(([key, g]) => {
                if (!grps[g.group]) grps[g.group] = [];
                grps[g.group].push({ key, name: g.name });
            });
            return grps;
        }, [GRINDER_DATABASE]);

        const handleSwap = () => {
            const temp = grinderA; setGrinderA(grinderB); setGrinderB(temp);
            if (result && result.valB && result.valB !== '-') setValA(result.valB.toString());
        };

        const result = useMemo(() => {
            const gA = GRINDER_DATABASE[grinderA]; const gB = GRINDER_DATABASE[grinderB]; const parsedA = parseFloat(valA);
            if (!gA || !gB || isNaN(parsedA)) return null;

            const rFirst = gA.ranges.find(r => r.min !== null);
            const rLast = [...gA.ranges].reverse().find(r => r.max !== null);

            if (parsedA < rFirst.min) return { error: `${t('err_low')} ${rFirst.min})`, catIdx: -1 };
            if (parsedA > rLast.max) return { error: `${t('err_high')} ${rLast.max})`, catIdx: -1 };

            let catIdx = -1; let ratio = 0;
            for (let i=0; i<gA.ranges.length; i++) {
                let r = gA.ranges[i];
                if (r.min !== null && r.max !== null && parsedA >= r.min && parsedA <= r.max) { catIdx = i; ratio = (parsedA - r.min) / (r.max - r.min); break; }
            }

            if (catIdx === -1) return { error: t('err_match'), catIdx: -1 };

            const rB = gB.ranges[catIdx];
            if (rB.min === null || rB.max === null) return { error: `${t('err_notsupport')} ${t('grind_cats_inline')[catIdx]}`, catIdx };

            let valB = rB.min + ratio * (rB.max - rB.min);
            if (gB.step === 1) { valB = Math.round(valB); } 
            else { let inv = 1.0 / gB.step; valB = Math.round(valB * inv) / inv; valB = parseFloat(valB.toFixed(2)); }

            return { valB, catIdx, catName: t('grind_cats_inline')[catIdx] };
        }, [grinderA, grinderB, valA, t, GRINDER_DATABASE]);

        const selectOptions = (
            <React.Fragment>
                <option value="" disabled>{t('select_grinder_placeholder')}</option>
                {Object.entries(groups).map(([gName, items]) => (
                    <optgroup key={gName} label={gName} className={`${c.textMuted} font-bold`}>
                        {items.map(item => <option key={item.key} value={item.key} className={`${c.textDark} font-medium`}>{item.name}</option>)}
                    </optgroup>
                ))}
            </React.Fragment>
        );

        return (
            <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-300">
                <div className="flex flex-col md:flex-row items-center gap-4 relative">
                    <div className={`flex-1 w-full ${c.card} p-5 rounded-2xl border border-[#7A93A2]/30 shadow-sm ${c.blue} bg-opacity-5 dark:bg-opacity-10`}>
                        <label className={`block text-sm font-bold ${c.blueText} mb-2`}>{t('from_grinder')}</label>
                        <select value={grinderA} onChange={e => setGrinderA(e.target.value)} className={`w-full p-3 rounded-xl border border-[#7A93A2]/40 ${c.inputBg} mb-4 outline-none focus:ring-2 focus:ring-[#7A93A2] text-sm font-bold ${c.textDark}`}>{selectOptions}</select>
                        <label className={`block text-sm font-bold ${c.blueText} mb-2`}>{t('current_grind')}</label>
                        <input type="number" value={valA} onChange={e => setValA(e.target.value)} placeholder={t('input_placeholder')} className={`w-full p-3 text-2xl font-black text-center rounded-xl border border-[#7A93A2]/40 ${c.inputBg} ${c.textDark} outline-none focus:ring-2 focus:ring-[#7A93A2]`} />
                        <div className={`text-center text-xs font-bold ${c.blueText} opacity-80 mt-2 min-h-[32px] flex items-center justify-center`}>{grinderA ? GRINDER_DATABASE[grinderA].unit : t('unit')}</div>
                    </div>

                    <button onClick={handleSwap} className={`p-3 ${c.card} border-2 ${c.border} hover:opacity-80 ${c.primaryText} rounded-full shadow-sm transition-all z-10 active:scale-95 group`}>
                        <ArrowRightLeft size={24} className="group-hover:rotate-180 transition-transform duration-300" />
                    </button>

                    <div className={`flex-1 w-full ${c.card} p-5 rounded-2xl border border-[#B3A394]/30 shadow-sm ${c.secondary} bg-opacity-5 dark:bg-opacity-10`}>
                        <label className={`block text-sm font-bold ${c.secondaryText} mb-2`}>{t('to_grinder')}</label>
                        <select value={grinderB} onChange={e => setGrinderB(e.target.value)} className={`w-full p-3 rounded-xl border border-[#B3A394]/40 ${c.inputBg} mb-4 outline-none focus:ring-2 focus:ring-[#B3A394] text-sm font-bold ${c.textDark}`}>{selectOptions}</select>
                        <label className={`block text-sm font-bold ${c.secondaryText} mb-2`}>{t('target_grind')}</label>
                        <div className={`w-full p-3 text-3xl font-black text-center ${result?.error ? 'text-red-500' : c.secondaryText} ${c.inputBg} rounded-xl border border-[#B3A394]/40 h-[62px] flex items-center justify-center shadow-inner`}>
                            {result ? (result.error ? 'N/A' : result.valB) : '-'}
                        </div>
                        <div className={`text-center text-xs font-bold ${c.secondaryText} opacity-80 mt-2 min-h-[32px] flex items-center justify-center`}>{grinderB ? GRINDER_DATABASE[grinderB].unit : t('unit')}</div>
                    </div>
                </div>

                {grinderB && (
                    <div className={`${c.card} p-6 rounded-2xl shadow-sm border ${c.border} animate-in fade-in duration-300`}>
                        {result && !result.error && (
                            <div className={`text-center text-sm font-bold p-4 ${c.inputBg} rounded-xl border ${c.border} mb-6 ${c.textDark}`}>
                                {t('grind_result_msg')} <strong className={c.primaryText}>{result.catName}</strong>{t('mapped_linear')}
                            </div>
                        )}
                        {result && result.error && (
                            <div className={`text-center text-sm font-bold p-4 ${c.inputBg} rounded-xl border ${c.border} mb-6 text-red-500`}>
                                {result.error}
                            </div>
                        )}

                        <div className="px-2">
                            <div className={`text-xs font-bold ${c.textMuted} mb-3 flex items-center gap-2`}>
                                <Settings2 size={16} /> 
                                {GRINDER_DATABASE[grinderB].name} {t('grind_visual')}
                            </div>
                            <div className={`flex h-4 rounded-full overflow-hidden ${c.bg} shadow-inner border ${c.border}`}>
                                {t('grind_cats').map((cat, idx) => (
                                    <div key={idx} className={`w-1/5 border-r border-black/5 dark:border-white/10 transition-colors duration-300 ${(result && result.catIdx === idx) ? c.bar[idx] : 'bg-transparent'}`}></div>
                                ))}
                            </div>
                            <div className={`flex text-[10px] sm:text-xs ${c.textMuted} mt-3 font-bold`}>
                                {t('grind_cats').map((cat, idx) => {
                                    const range = GRINDER_DATABASE[grinderB].ranges[idx];
                                    const rangeText = range && range.min !== null ? `${range.min} - ${range.max}` : '-';
                                    const isHighlight = result && result.catIdx === idx;
                                    return (
                                        <div key={idx} className={`w-1/5 flex flex-col items-center gap-1.5 whitespace-pre-wrap ${isHighlight ? c.textDark : ''}`}>
                                            <span className="text-center leading-tight">{cat}</span>
                                            <span className={`px-1.5 py-0.5 rounded-md font-mono transition-all duration-300 ${isHighlight ? `${c.bar[idx]} text-white shadow-md scale-110` : `${c.inputBg} border ${c.border}`}`}>
                                                {rangeText}
                                            </span>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                        {result && result.catIdx !== -1 && <GrindVisualizer catIdx={result.catIdx} c={c} lang={lang} />}
                    </div>
                )}

                <div className={`p-5 ${c.infoBg} rounded-2xl border ${c.border} text-[12px] sm:text-[13px] ${c.textMuted} leading-relaxed`}>
                    <strong className={`${c.textDark} block mb-2`}>{t('hint_title')}</strong>
                    <ul className="list-disc pl-5 space-y-1.5">
                        <li>{t('hint_1')}</li>
                        <li>{t('hint_2')}</li>
                        <li>{t('hint_3')}</li>
                        <li>{t('hint_4')}</li>
                    </ul>
                </div>
            </div>
        );
    }

    // ==========================================
    // 9. App 主程式與掛載點
    // ==========================================
    function App() {
        const [view, setView] = useState('home'); 
        const [lang, setLang] = useState('zh');
        const [isDark, setIsDark] = useState(false);
        
        const t = (key) => i18n[lang][key] || key;
        const c = getColors(isDark); 

        useEffect(() => {
            document.body.className = c.bg;
        }, [isDark, c.bg]);

        return (
            <div className={`min-h-screen ${c.bg} font-sans text-gray-800 pb-20 selection:bg-[#B3A394] selection:text-white transition-colors duration-300`}>
                <button onClick={() => setIsDark(!isDark)} className={`fixed bottom-6 right-6 z-50 p-3.5 rounded-full shadow-lg border ${c.border} ${c.card} ${c.textDark} hover:scale-110 active:scale-95 transition-all duration-300`}>
                    {isDark ? <Sun size={24} /> : <Moon size={24} />}
                </button>

                <div className={`${c.primary} text-white shadow-md sticky top-0 z-50 transition-colors duration-300`}>
                    <div className="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            {view !== 'home' && <button onClick={() => setView('home')} className="p-2 -ml-2 rounded-full hover:bg-white/20 transition-colors"><ArrowLeft size={20} /></button>}
                            <Coffee size={24} strokeWidth={2.5} />
                            <h1 className="text-xl font-bold tracking-widest hidden sm:block">
                                {view === 'home' ? t('app_title') : (view === 'brew' ? t('tool_brew_title') : (view === 'water' ? t('tool_water_title') : t('tool_grind_title')))}
                            </h1>
                        </div>
                        <div className="flex items-center bg-white/20 p-1 rounded-lg backdrop-blur-sm">
                            <button onClick={() => setLang('zh')} className={`px-3 py-1.5 rounded-md text-xs font-bold transition-all ${lang === 'zh' ? 'bg-white text-[#7E8D85] shadow-sm' : 'text-white hover:bg-white/20'}`}>中</button>
                            <button onClick={() => setLang('en')} className={`px-3 py-1.5 rounded-md text-xs font-bold transition-all ${lang === 'en' ? 'bg-white text-[#7E8D85] shadow-sm' : 'text-white hover:bg-white/20'}`}>EN</button>
                            <button onClick={() => setLang('ja')} className={`px-3 py-1.5 rounded-md text-xs font-bold transition-all ${lang === 'ja' ? 'bg-white text-[#7E8D85] shadow-sm' : 'text-white hover:bg-white/20'}`}>JA</button>
                        </div>
                    </div>
                </div>
                <main className="max-w-3xl mx-auto px-4 py-8 relative">
                    {view === 'home' && <HomeView setView={setView} t={t} c={c} />}
                    {view === 'brew' && <BrewTool lang={lang} t={t} c={c} />}
                    {view === 'grind' && <GrindTool lang={lang} t={t} c={c} />}
                    {view === 'water' && <WaterTool lang={lang} c={c} />}
                </main>
            </div>
        );
    }

    function HomeView({ setView, t, c }) {
        const changelog = t('changelog');
        return (
            <div className="animate-in fade-in zoom-in-95 duration-300">
                <div className="text-center mb-8"><h2 className={`text-2xl md:text-3xl font-bold ${c.textDark} mb-2`}>{t('home_title')}</h2><p className={`${c.textMuted}`}>{t('home_subtitle')}</p></div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
                    <button onClick={() => setView('brew')} className={`${c.card} border-2 ${c.border} rounded-2xl p-6 text-left hover:border-[#C9B793] hover:shadow-lg transition-all group`}><div className={`w-14 h-14 rounded-full ${c.yellow} text-white flex items-center justify-center mb-4 group-hover:scale-110 transition-transform shadow-sm`}><Thermometer size={28} /></div><h3 className={`text-xl font-bold ${c.textDark} mb-2`}>{t('tool_brew_title')}</h3><p className={`text-sm ${c.textMuted} leading-relaxed`}>{t('tool_brew_desc')}</p></button>
                    <button onClick={() => setView('grind')} className={`${c.card} border-2 ${c.border} rounded-2xl p-6 text-left hover:border-[#7A93A2] hover:shadow-lg transition-all group`}><div className={`w-14 h-14 rounded-full ${c.blue} text-white flex items-center justify-center mb-4 group-hover:scale-110 transition-transform shadow-sm`}><Wrench size={28} /></div><h3 className={`text-xl font-bold ${c.textDark} mb-2`}>{t('tool_grind_title')}</h3><p className={`text-sm ${c.textMuted} leading-relaxed`}>{t('tool_grind_desc')}</p></button>
                    <button onClick={() => setView('water')} className={`${c.card} border-2 ${c.border} rounded-2xl p-6 text-left hover:border-[#8AA192] hover:shadow-lg transition-all group`}><div className={`w-14 h-14 rounded-full ${c.primary} text-white flex items-center justify-center mb-4 group-hover:scale-110 transition-transform shadow-sm`}><Droplets size={28} /></div><h3 className={`text-xl font-bold ${c.textDark} mb-2`}>{t('tool_water_title')}</h3><p className={`text-sm ${c.textMuted} leading-relaxed`}>{t('tool_water_desc')}</p></button>
                </div>
                <div className="mt-12 animate-in fade-in slide-in-from-bottom-4 duration-500 delay-150">
                    <div className="flex items-center justify-center gap-3 mb-6"><div className={`h-px ${c.border} flex-1`}></div><h3 className={`flex items-center gap-2 text-lg font-bold ${c.textDark} px-2`}><Clock size={18} className={c.primaryText} />{t('changelog_title')}</h3><div className={`h-px ${c.border} flex-1`}></div></div>
                    <div className={`${c.card} p-6 sm:p-8 rounded-2xl shadow-sm border ${c.border}`}>
                        <div className="space-y-8">
                            {Array.isArray(changelog) && changelog.map((log, idx) => (
                                <div key={idx} className={`relative pl-6 sm:pl-8 border-l-2 ${c.border}`}>
                                    <div className={`absolute -left-[9px] top-1.5 w-4 h-4 rounded-full border-2 ${c.card} ${idx === 0 ? c.primary : c.accent}`}></div>
                                    <div className="flex flex-col sm:flex-row sm:items-baseline gap-1 sm:gap-3 mb-3"><span className={`text-lg font-black ${c.textDark}`}>{log.version}</span><span className={`text-xs font-bold ${c.textMuted}`}>{log.date}</span></div>
                                    <ul className={`list-disc pl-5 text-[13px] sm:text-sm ${c.textDark} space-y-1.5 leading-relaxed`}>{log.changes.map((change, i) => (<li key={i}>{change}</li>))}</ul>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
