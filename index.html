// ==========================================
// 4. Troubleshooter (風味羅盤組件)
// ==========================================
function Troubleshooter({ recipe, c, t, lang, onClose }) {
const l = (zh, en, ja) => ({ zh, en, ja }[lang] || zh);
const [scores, setScores] = useState({ a: 3, s: 3, b: 3, bd: 3, af: 3 });

const dimLabels = {
    a: { icon: <Citrus size={16}/>, label: t('dim_acid'), color: 'text-[#C18F8F]', hex: '#C18F8F' }, 
    s: { icon: <Honey size={16}/>, label: t('dim_sweet'), color: 'text-[#C9B793]', hex: '#C9B793' },  
    b: { icon: <Astringent size={16}/>, label: t('dim_bitter'), color: 'text-[#B3A394]', hex: '#B3A394' }, 
    bd: { icon: <Mouthfeel size={16}/>, label: t('dim_body'), color: 'text-[#7A93A2]', hex: '#7A93A2' }, 
    af: { icon: <Wind size={16}/>, label: t('dim_after'), color: 'text-[#7E8D85]', hex: '#7E8D85' }  
};

const polygonPoints = useMemo(() => {
    const keys = ['a', 's', 'b', 'bd', 'af'];
    return keys.map((key, i) => {
        const score = scores[key];
        const r = (score / 5) * 40;
        const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2; 
        const x = 50 + r * Math.cos(angle);
        const y = 50 + r * Math.sin(angle);
        return `${x},${y}`;
    }).join(' ');
}, [scores]);

const getDiagnosis = () => {
    const { a, s, b, bd, af } = scores;
    
    if (a===3 && s===3 && b===3 && bd===3 && af===3) {
        return {
            title: l("雷達處於預設狀態 (Default State)", "Default Radar", "デフォルト状態"),
            desc: l(
                "請拉動數值描繪風味。系統將綜合咖啡萃取科學與參數變因，為您解析可溶性芳香物質的釋放階段，並提供大方向的專業微調建議。", 
                "Adjust sliders to map your flavor. The system applies Extraction Theory to analyze soluble compound release and offer professional parameter corrections.", 
                "数値をスライドして風味を描いてください。抽出理論に基づき、可溶性成分の放出を分析し、専門的なパラメータ補正を大枠で提案します。"
            )
        };
    }

    if (s >= 4 && af >= 4 && b <= 2) {
        return {
            title: l("理想萃取 / 貼近甜蜜點 (Ideal Extraction)", "Ideal Extraction", "理想的な抽出"),
            desc: l(
                "【科學成因】\n甜感飽滿且餘韻綿長，表示萃取率 (EY) 完美落在理想區間。優質芳香物質與梅納反應產生的中大分子糖分已充分釋放，且成功避開了沖煮尾段的重度苦味物質。\n\n【調整建議】\n這是一次極高水準的沖煮！請鎖定目前的「水粉比、水溫、研磨度」鐵三角，依此為基準點微調即可。", 
                "[Science]\nHigh sweetness and long aftertaste indicate an Extraction Yield (EY) hitting the sweet spot. Maillard reaction sugars are fully dissolved, avoiding late-stage bitter compounds.\n\n[Action]\nOutstanding brew! Lock in your current brew ratio, temperature, and grind size as your golden baseline.", 
                "【科学的要因】\n豊かな甘みと長い余韻は、収率(EY)が理想的な範囲にあることを示します。メイラード反応による糖分が十分に溶け出し、終盤の強い苦味成分をうまく避けています。\n\n【調整の提案】\n非常に素晴らしい抽出です！現在の粉量、湯温、挽き目をベースラインとして固定してください。"
            )
        };
    }

    if (a >= 4 && b >= 4) {
        return {
            title: l("極端不均萃取 / 通道效應 (Uneven Extraction & Channeling)", "Uneven Extraction (Channeling)", "不均一な抽出 / チャネリング"),
            desc: l(
                "【科學成因】\n同時出現尖銳有機酸與木質部苦澀，是典型的「通道效應」。水流避開了大部分粉層，導致局部粉層被過度萃取（強制釋出單寧酸與酚類），而其餘粉層萃取不足（僅釋出表層果酸，缺乏中段焦糖化糖分平衡）。\n\n【調整建議】\n1. 改善佈水均勻度，注水時避免水流過大或直接衝擊濾紙邊緣。\n2. 檢查磨豆機均勻度，若細粉過多易導致底部阻塞而引發側邊通道。", 
                "[Science]\nSimultaneous sharp acids and harsh bitterness indicate channeling. Water bypasses the bed, locally over-extracting (tannins/phenols) while under-extracting the rest (only surface acids, lacking middle-stage sugars for balance).\n\n[Action]\n1. Improve pouring technique; avoid hitting filter edges.\n2. Check grinder consistency; excess fines can clog the bottom and force side channels.", 
                "【科学的要因】\n鋭い酸味と渋みが同時に現れるのは典型的なチャネリングです。お湯が一部の粉に集中し、局所的に過抽出（タンニンやフェノール）が起き、他は未抽出（表面の酸のみで甘みがない）になります。\n\n【調整の提案】\n1. 注湯を均一にし、フィルターの端を直接狙わない。\n2. ミルの均一性を確認し、微粉による目詰まりを防ぐ。"
            )
        };
    }

    if (b >= 4) {
        return {
            title: l("萃取過度 / 乾餾物質釋出 (Over-Extraction)", "Over-Extraction", "過抽出 (オーバーエクストラクション)"),
            desc: l(
                "【科學成因】\n咖啡風味的溶出順序為：酸 ➔ 甜 ➔ 苦。當苦澀感佔據主導，意味著萃取進入尾段，將大分子的多酚類與乾餾物質強制溶出。這通常肇因於：粉與水接觸時間過長、水溫過高，或過度擾動（Agitation）。\n\n【調整建議】\n1. 研磨度調粗 1-2 格（減少總表面積）。\n2. 沖煮水溫降低 2-3°C（降低溶劑動能）。\n3. 減少斷水次數，採用中心小水流平穩注入。", 
                "[Science]\nExtraction order is: Acids ➔ Sugars ➔ Bitters. Dominant harshness means late-stage high-molecular-weight polyphenols and dry distillates were forced out. Causes: prolonged contact time, excess heat, or over-agitation.\n\n[Action]\n1. Grind 1-2 clicks coarser (reduce surface area).\n2. Lower temp by 2-3°C (reduce solvent kinetic energy).\n3. Reduce pouring stages and minimize agitation.", 
                "【科学的要因】\n抽出順序は「酸→甘み→苦味」です。渋みやエグみが強い場合、終盤の高分子ポリフェノールや乾留物が強制的に溶け出しています。原因は接触時間の長さ、高温、または過度な撹拌です。\n\n【調整の提案】\n1. 挽き目を1-2段階粗くする。\n2. 湯温を2-3℃下げる。\n3. 注湯の回数を減らし、穏やかに注ぐ。"
            )
        };
    }

    if (a >= 4 && s <= 2) {
        return {
            title: l("萃取不足 / 有機酸失衡 (Under-Extraction)", "Under-Extraction", "未抽出 (アンダーエクストラクション)"),
            desc: l(
                "【科學成因】\n咖啡中分子量最小的水果酸最先被溶出。若在此階段後萃取動能不足，無法帶出中段的焦糖與寡糖來提供「包覆感」，就會呈現單薄且刺鼻的尖酸。主因通常是：粉粒過粗、水溫偏低，或悶蒸未完全排氣。\n\n【調整建議】\n1. 研磨度調細 1-2 格（增加萃取接觸面積）。\n2. 提高水溫 2°C（增加萃取效能）。\n3. 延長前段悶蒸時間 10 秒，確保粉層完全濕潤排氣。", 
                "[Science]\nLow-weight organic acids extract first. Without mid-stage complex sugars to envelop them, the acidity tastes sharp and sour. Causes: grind too coarse, water too cool, or insufficient blooming.\n\n[Action]\n1. Grind 1-2 clicks finer (increase extraction area).\n2. Raise temp by 2°C (increase kinetic energy).\n3. Extend bloom time by 10s for full saturation.", 
                "【科学的要因】\n分子量の小さい有機酸が最初に溶け出します。中盤の糖分が不足すると、バランスが崩れて鋭い酸味になります。原因は粗すぎる挽き目、低い湯温、または蒸らし不足です。\n\n【調整の提案】\n1. 挽き目を1-2段階細かくする。\n2. 湯温を2℃上げる。\n3. 蒸らし時間を10秒長くし、完全にガスを抜く。"
            )
        };
    }

    if (bd <= 2 && b <= 3) {
        return {
            title: l("濃度偏低 / 總溶解固體量不足 (Low TDS & Body)", "Low TDS (Watery)", "濃度不足 (Low TDS)"),
            desc: l(
                "【科學成因】\n觸感單薄、缺乏醇厚度（Body），反映出咖啡液的「總溶解固體量 (TDS)」未達理想標準。這可能來自兩種情況：一是「水粉比」拉得太大，二是水流過快產生了 Bypass（旁流），水未經有效萃取即流下。\n\n【調整建議】\n1. 最直接作法：增加 1-2g 的總粉量，維持總水量不變。\n2. 技巧修正：放慢注水流速，或將一次大水流拆分為兩次注水，強制拉長水與粉層的浸潤接觸時間。", 
                "[Science]\nThin mouthfeel and lack of body indicate Total Dissolved Solids (TDS) fell below the ideal standard. This stems from either too wide a brew ratio or excessive water bypass (water escaping without extracting).\n\n[Action]\n1. Increase coffee dose by 1-2g keeping water volume constant.\n2. Pour slower or split a single large pour into two to force a longer contact time.", 
                "【科学的要因】\n口当たりが薄くボディがないのは、TDS（総溶解固形分）が理想の基準に達していないためです。粉に対する湯量が多すぎるか、お湯が早すぎてバイパス（通り抜け）が発生しています。\n\n【調整の提案】\n1. 水量を変えずに粉量を1-2g増やす。\n2. 注ぐ速度を遅くするか、注湯回数を増やして接触時間を長くする。"
            )
        };
    }

    return {
        title: l("結構完整，具微調潛力 (Balanced Profile)", "Balanced Profile", "バランスの取れた風味"),
        desc: l(
            "【科學成因】\n當前的五維數據沒有明顯極端值，表示您已將萃取率 (EY) 控制在合理範圍內，避開了嚴重的缺陷。接下來的目標是尋找這支豆子的「甜蜜點 (Sweet Spot)」。\n\n【調整建議】\n若想提升香氣與酸質層次，可嘗試將水溫提高 1°C；若想增加醇厚度與甜感，可嘗試在第二/三段注水時放低壺嘴，減緩水流衝擊以增加浸泡感。", 
            "[Science]\nA well-distributed radar indicates extraction is within a reasonable range without major defects. The next step is hitting the specific coffee bean's optimal 'Sweet Spot'.\n\n[Action]\nTo boost aroma and bright acidity, raise water temp by 1°C. To enhance body and sweetness, lower your kettle height during mid-pours to reduce agitation and increase steeping effect.", 
            "【科学的要因】\n極端な値がなく、抽出収率が妥当な範囲にあり、重大な欠陥を避けています。次の目標は、その豆の「スイートスポット」を見つけることです。\n\n【調整の提案】\n香りと酸味の層を引き立てたい場合は湯温を1℃上げてください。ボディと甘みを増やしたい場合は、中盤の注湯でケトルを下げ、撹拌を減らして浸漬効果を高めてください。"
        )
    };
};

const diagnosis = getDiagnosis();

return (
<div className={`mt-6 p-5 sm:p-6 rounded-3xl border ${c.border} ${c.card} shadow-sm animate-in slide-in-from-top-2 duration-300`}>
    <div className="flex items-center justify-between mb-2">
        <h4 className={`text-sm font-black ${c.textDark} flex items-center gap-2`}><Compass size={18} className={c.primaryText}/> {t('tweak_title')}</h4>
        <div className="flex gap-2">
            <button onClick={()=>setScores({a:3,s:3,b:3,bd:3,af:3})} className={`text-[10px] font-bold ${c.textMuted} px-2 py-1 rounded-md ${c.inputBg} hover:opacity-80 transition-opacity`}>{t('tweak_reset')}</button>
            <button onClick={onClose} className={`text-[10px] font-bold ${c.textMuted} px-2 py-1 rounded-md ${c.inputBg} hover:opacity-80 transition-opacity`}>✕</button>
        </div>
    </div>
    <p className={`text-[11px] sm:text-xs ${c.textMuted} mb-6 font-bold leading-relaxed`}>{t('tweak_desc')}</p>

    <div className="flex flex-col md:flex-row items-center gap-6 md:gap-8">
        <div className={`w-32 h-32 sm:w-40 sm:h-40 shrink-0 relative flex items-center justify-center rounded-full ${c.inputBg} border ${c.border} shadow-inner`}>
            <svg viewBox="0 0 100 100" className="absolute w-[80%] h-[80%] opacity-20">
                {[10, 20, 30, 40].map((r, idx) => (
                    <polygon key={idx} fill="none" stroke="currentColor" strokeWidth="0.5" className={c.textMuted}
                        points={[0,1,2,3,4].map(i => `${50 + r * Math.cos(Math.PI*2*i/5 - Math.PI/2)},${50 + r * Math.sin(Math.PI*2*i/5 - Math.PI/2)}`).join(' ')} 
                    />
                ))}
                {[0,1,2,3,4].map(i => (
                    <line key={i} x1="50" y1="50" x2={50 + 40 * Math.cos(Math.PI*2*i/5 - Math.PI/2)} y2={50 + 40 * Math.sin(Math.PI*2*i/5 - Math.PI/2)} stroke="currentColor" strokeWidth="0.5" className={c.textMuted} />
                ))}
            </svg>
            <svg viewBox="0 0 100 100" className="absolute w-[80%] h-[80%] overflow-visible">
                <polygon points={polygonPoints} fill={dimLabels.af.hex} fillOpacity="0.25" stroke={dimLabels.af.hex} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                {[0,1,2,3,4].map(i => {
                    const keys = ['a', 's', 'b', 'bd', 'af'];
                    const r = (scores[keys[i]] / 5) * 40;
                    const cx = 50 + r * Math.cos(Math.PI*2*i/5 - Math.PI/2);
                    const cy = 50 + r * Math.sin(Math.PI*2*i/5 - Math.PI/2);
                    return <circle key={i} cx={cx} cy={cy} r="3" fill="white" stroke={dimLabels[keys[i]].hex} strokeWidth="1.5" />;
                })}
            </svg>
        </div>
        <div className="flex-1 w-full space-y-3">
            {Object.keys(scores).map(key => {
                const dim = dimLabels[key];
                return (
                    <div key={key} className={`flex items-center gap-3 p-2.5 rounded-xl border ${c.border} bg-black/5 dark:bg-white/5`}>
                        <div className={`flex items-center gap-1.5 w-[76px] shrink-0 ${dim.color}`}>

                        <span className={`w-4 text-center font-black text-sm ${c.textDark}`}>{scores[key]}</span>

    <div className={`mt-6 p-4 sm:p-5 rounded-2xl ${c.infoBg} border-l-4 ${c.primary} animate-in fade-in duration-300`}>
        <div className={`text-[10px] font-black ${c.primaryText} mb-1 uppercase tracking-widest`}>Diagnosis</div>

// ==========================================
// 5. 研磨顆粒模擬視覺化 (GrindVisualizer)
// ==========================================
function GrindVisualizer({ catIdx, c, lang }) {
const l = (zh, en, ja) => ({ zh, en, ja }[lang] || zh);
const [scale, setScale] = useState(1);
const pxPerMm = 3.779527559 * scale;
const visualData = [
{ micron: "200 - 300 μm", mean: 250, texture: l("麵粉狀 / 糖粉", "Powder / Sugar", "パウダー"), finesRatio: 0.15 },
{ micron: "300 - 500 μm", mean: 400, texture: l("細鹽狀", "Fine Salt", "細かい塩"), finesRatio: 0.15 },
{ micron: "500 - 800 μm", mean: 650, texture: l("細砂糖", "Caster Sugar", "グラニュー糖"), finesRatio: 0.2 },
{ micron: "800 - 1200 μm", mean: 1000, texture: l("粗砂", "Coarse Sand", "粗糖 / 粗砂"), finesRatio: 0.2 },
{ micron: "1200 - 1500+ μm", mean: 1350, texture: l("粗鹽 / 碎胡椒", "Coarse Salt", "粗塩 / 砕いた黒胡椒"), finesRatio: 0.25 }
];
const current = visualData[catIdx] || visualData[3];
const particles = React.useMemo(() => {
const meanArea = Math.pow(current.mean / 1000, 2);

<div><label className={`block text-[10px] font-black ${c.blueText} mb-1`}>LYLAC</label><input type="number" min="0" value={apaxCustomDrops.l || ''} onChange={e => setApaxCustomDrops({...apaxCustomDrops, l: Number(e.target.value)})} placeholder="0" className={`w-full bg-white dark:bg-[#1C1F22] border ${c.border} ${c.textDark} font-bold py-2 px-2 rounded-lg text-center`} /></div>

{parseFloat(apaxVolume) > 0 && (

)}

)}

}

// ==========================================
// 7. BrewTool (沖煮參數查詢 & 風味羅盤)
// ==========================================
function BrewTool({ lang, t, c }) {
const { DRIPPER_CATEGORIES, RECIPE_DATABASE, GRINDER_DATABASE } = useDatabases(lang);
const [selectedDripperId, setSelectedDripperId] = useState('');
const [selectedRecipeId, setSelectedRecipeId] = useState(null);
const [customWeight, setCustomWeight] = useState(15); 
const [isSelectorOpen, setIsSelectorOpen] = useState(false);
const handleDripperChange = (id) => { setSelectedDripperId(id); setIsSelectorOpen(false); setSelectedRecipeId(null); };
const handleSelectRecipe = (recipe) => { setSelectedRecipeId(recipe.id); setCustomWeight(recipe.baseCoffee); setIsSelectorOpen(false); };
const filteredRecipes = selectedDripperId ? RECIPE_DATABASE.filter(r => r.dripper === selectedDripperId) : [];
const selectedRecipe = RECIPE_DATABASE.find(r => r.id === selectedRecipeId);

const groupedRecipes = useMemo(() => {
    const groups = [];
    filteredRecipes.forEach(r => {
        let family = r.name; let variant = '';
        const match = r.name.match(/^(.*?)(?:\((.*?)\))?$/);
        if (match && match[2]) { family = match[1].trim(); variant = match[2].trim(); }
        let existingGroup = groups.find(g => g.family === family);
        if (!existingGroup) { existingGroup = { family, author: r.author, drinkType: r.drinkType, items: [] }; groups.push(existingGroup); }
        existingGroup.items.push({ ...r, variant });
    });
    return groups;
}, [filteredRecipes]);

return (
<div className="space-y-5 animate-in slide-in-from-bottom-4 duration-300 relative">
<div className={`${c.card} rounded-2xl shadow-sm border ${c.border} p-4`}>
<label className={`flex items-center gap-2 text-sm font-bold ${c.textDark} mb-3`}><Filter size={16} className={c.primaryText} /> {t('select_dripper')}</label>
<div className="relative">
<select value={selectedDripperId} onChange={(e) => handleDripperChange(e.target.value)} className={`w-full ${c.inputBg} border ${selectedDripperId === '' ? 'text-gray-400' : c.textDark} ${c.border} font-bold py-3.5 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#7E8D85] appearance-none transition-colors`}>
<option value="" disabled>{t('select_dripper_placeholder')}</option>
{Object.entries(DRIPPER_CATEGORIES).map(([category, drippers]) => (
<optgroup key={category} label={category} className={`${c.textMuted} font-bold`}>{drippers.map(d => <option key={d.id} value={d.id} className={`${c.textDark} font-medium`}>{d.name}</option>)}</optgroup>
))}
</select>
<div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400"><ChevronDown size={20} /></div>
</div>
</div>
{!selectedDripperId ? (
<div className={`${c.card} rounded-2xl shadow-sm border ${c.border} p-12 text-center animate-in fade-in duration-300`}><div className={`w-16 h-16 mx-auto ${c.infoBg} rounded-full flex items-center justify-center mb-4 ${c.secondaryText}`}><Filter size={32} /></div><h3 className={`text-lg font-bold ${c.textDark} mb-1`}>{t('no_dripper_title')}</h3><p className={`text-sm ${c.textMuted}`}>{t('no_dripper_desc')}</p></div>
) : filteredRecipes.length > 0 ? (
<div className="space-y-4 animate-in fade-in duration-300">
<div className="relative z-20">
<button onClick={() => setIsSelectorOpen(!isSelectorOpen)} className={`w-full text-left ${c.card} border ${isSelectorOpen ? 'border-[#7E8D85] ring-2 ring-[#7E8D85] ring-opacity-20' : c.border} rounded-2xl p-4 shadow-sm transition-all flex items-center justify-between outline-none`}>
{selectedRecipe ? (
<div className="flex items-center gap-3"><div className={`p-2.5 rounded-full ${selectedRecipe.drinkType === 'iced' ? c.icedTag : c.hotTag}`}>{selectedRecipe.drinkType === 'iced' ? <Snowflake size={20} /> : <Flame size={20} />}</div><div><div className={`text-[11px] font-bold ${c.textMuted} mb-0.5`}>{t('current_recipe')}</div><div className={`font-bold text-lg ${c.textDark}`}>{selectedRecipe.name}</div></div></div>
) : (<div className={`font-bold ${c.textMuted} text-lg`}>{t('select_recipe')}</div>)}
<div className={`p-2 rounded-full ${c.infoBg} ${c.textMuted} transition-transform duration-300 ${isSelectorOpen ? 'rotate-180' : ''}`}><ChevronDown size={20} /></div>
</button>
{isSelectorOpen && (
<div className={`absolute top-full left-0 right-0 mt-2 ${c.card} border ${c.border} rounded-2xl shadow-xl overflow-hidden animate-in slide-in-from-top-2 duration-200 max-h-[60vh] overflow-y-auto no-scrollbar`}>
<div className={`p-2 ${c.inputBg} border-b ${c.border}`}><p className={`text-xs font-bold ${c.textMuted} px-2 py-1`}>{t('available_recipes')} ({filteredRecipes.length})</p></div>
{groupedRecipes.map((group, idx) => (
    <div key={idx} className={`p-4 border-b last:border-0 ${c.border} ${group.items.some(i => i.id === selectedRecipe?.id) ? c.infoBg : c.card} transition-colors`}>
        {group.items.length === 1 ? (
            <button onClick={() => handleSelectRecipe(group.items[0])} className="w-full text-left flex items-center justify-between group outline-none">
                <div className="flex items-center gap-3">
                    {group.items[0].drinkType === 'iced' ? <Snowflake size={18} className={c.icedIcon} /> : <Flame size={18} className={c.hotIcon} />}
                    <div>
                        <div className={`font-bold ${c.textDark} group-hover:${c.primaryText} transition-colors`}>{group.items[0].name}</div>
                        {group.author && <div className={`text-xs ${c.textMuted} mt-0.5`}>by {group.author}</div>}
                    </div>
                </div>
                {selectedRecipe?.id === group.items[0].id && <CheckCircle2 size={20} className={c.primaryText} />}
            </button>
        ) : (
            <div className="w-full text-left">
                <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-3">
                        {group.drinkType === 'iced' ? <Snowflake size={18} className={c.icedIcon} /> : <Flame size={18} className={c.hotIcon} />}
                        <div>
                            <div className={`font-bold ${c.textDark}`}>{group.family}</div>
                            {group.author && <div className={`text-xs ${c.textMuted} mt-0.5`}>by {group.author}</div>}
                        </div>
                    </div>
                </div>
                <div className="flex flex-wrap gap-2 pl-7">
                    {group.items.map(item => (
                        <button 
                            key={item.id} 
                            onClick={() => handleSelectRecipe(item)}
                            className={`px-3 py-1.5 text-xs font-bold rounded-lg border transition-all active:scale-95 outline-none ${selectedRecipe?.id === item.id ? `${c.primary} text-white border-transparent shadow-sm` : `${c.inputBg} ${c.textDark} ${c.border} hover:border-[#7E8D85]`}`}
                        >
                            {item.variant}
                        </button>
                    ))}
                </div>
            </div>
        )}
    </div>
))}
</div>
)}
</div>
{selectedRecipe ? (
<div className={`transition-opacity duration-300 ${isSelectorOpen ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}><BrewRecipeDetail recipe={selectedRecipe} GRINDER_DATABASE={GRINDER_DATABASE} customWeight={customWeight} setCustomWeight={setCustomWeight} t={t} c={c} lang={lang} /></div>
) : (
<div className={`text-center py-10 animate-in fade-in duration-300 ${isSelectorOpen ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}><div className={`w-12 h-12 mx-auto ${c.infoBg} rounded-full flex items-center justify-center mb-3 ${c.secondaryText}`}><Coffee size={24} /></div><p className={`text-sm font-bold ${c.textMuted}`}>{t('select_recipe_prompt')}</p></div>
)}
</div>
) : (
<div className={`${c.card} rounded-2xl shadow-sm border ${c.border} p-12 text-center animate-in fade-in duration-300`}><div className={`w-16 h-16 mx-auto ${c.infoBg} rounded-full flex items-center justify-center mb-4 ${c.secondaryText}`}><Filter size={32} /></div><h3 className={`text-lg font-bold ${c.textDark} mb-1`}>{t('no_recipe_title')}</h3><p className={`text-sm ${c.textMuted}`}>{t('no_recipe_desc')}</p></div>
)}
</div>
);
}

function BrewRecipeDetail({ recipe, GRINDER_DATABASE, customWeight, setCustomWeight, t, c, lang }) {
const ratio = (customWeight / recipe.baseCoffee) || 1;
const isIced = recipe.drinkType === 'iced';
const maxWater = Math.max(...recipe.steps.map(s => s.water || 0));
const baseRatio = (maxWater / recipe.baseCoffee).toFixed(1).replace('.0', '');
const renderDynamicText = (textObj) => typeof textObj === 'function' ? textObj(ratio) : textObj;
const [elapsed, setElapsed] = useState(0);
const [isRunning, setIsRunning] = useState(false);
const [showTroubleshoot, setShowTroubleshoot] = useState(false);
const [isGrindOpen, setIsGrindOpen] = useState(false);
const [userGrinder, setUserGrinder] = useState('');

useEffect(() => { let interval; if (isRunning) interval = setInterval(() => setElapsed(e => e + 1), 1000); return () => clearInterval(interval); }, [isRunning]);
useEffect(() => { setElapsed(0); setIsRunning(false); setShowTroubleshoot(false); setIsGrindOpen(false); }, [recipe.id]);

const formatTime = (secs) => { const m = Math.floor(secs / 60); const s = secs % 60; return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; };
const stepStartTimes = useMemo(() => {
    const times = recipe.steps.map(s => { const m = s.time.match(/(\d+):(\d+)/); return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : -1; });
    for(let i = 1; i < times.length; i++) { if(times[i] === -1) times[i] = times[i-1] + 30; } return times;
}, [recipe]);
const activeStepIndex = useMemo(() => { if (elapsed === 0 && !isRunning) return -1; let idx = 0; for(let i = 0; i < stepStartTimes.length; i++) { if (elapsed >= stepStartTimes[i]) idx = i; } return idx; }, [elapsed, isRunning, stepStartTimes]);

const grindGroups = useMemo(() => { 
    let grps = {}; 
    Object.entries(GRINDER_DATABASE).forEach(([key, g]) => { 
        if (!grps[g.group]) grps[g.group] = []; 
        grps[g.group].push({ key, name: g.name }); 
    }); 
    Object.keys(grps).forEach(k => {
        grps[k].sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
    });
    return grps; 
}, [GRINDER_DATABASE]);

const convertedGrind = useMemo(() => {
    if (!userGrinder || !recipe.baseGrind) return null;
    const gA = GRINDER_DATABASE[recipe.baseGrind.grinder]; const gB = GRINDER_DATABASE[userGrinder]; const parsedA = parseFloat(recipe.baseGrind.val);
    if (!gA || !gB || isNaN(parsedA)) return null;
    let catIdx = -1; let r_ratio = 0;
    for (let i=0; i<gA.ranges.length; i++) { let r = gA.ranges[i]; if (r.min !== null && r.max !== null && parsedA >= r.min && parsedA <= r.max) { catIdx = i; r_ratio = (parsedA - r.min) / (r.max - r.min); break; } }
    if (catIdx === -1) return { error: t('err_match') };
    const rB = gB.ranges[catIdx]; if (rB.min === null || rB.max === null) return { error: t('err_notsupport') };
    let valB = rB.min + r_ratio * (rB.max - rB.min);
    if (gB.step === 1) valB = Math.round(valB); else { let inv = 1.0 / gB.step; valB = Math.round(valB * inv) / inv; valB = parseFloat(valB.toFixed(2)); }
    return { valB, unit: gB.unit };
}, [userGrinder, recipe, GRINDER_DATABASE, t]);

// 預先計算基礎研磨度所在的分類 Index，以動態顯示對應的實體顯微鏡
const baseCatIdx = useMemo(() => {
    if (!recipe.baseGrind) return -1;
    const targetGrinder = (userGrinder && !convertedGrind?.error) ? userGrinder : recipe.baseGrind.grinder;
    const targetVal = (userGrinder && !convertedGrind?.error) ? convertedGrind.valB : parseFloat(recipe.baseGrind.val);
    const gA = GRINDER_DATABASE[targetGrinder];
    if (!gA || isNaN(targetVal)) return -1;
    for (let i=0; i<gA.ranges.length; i++) {
        let r = gA.ranges[i];
        if (r.min !== null && r.max !== null && targetVal >= r.min && targetVal <= r.max) return i;
    }
    return -1;
}, [recipe.baseGrind, userGrinder, convertedGrind, GRINDER_DATABASE]);

return (
<div className="space-y-4">
    <div className={`${c.card} rounded-2xl shadow-sm border ${c.border} p-6 flex flex-col items-center justify-center relative overflow-hidden`}>
        <div className={`absolute top-0 left-0 w-1.5 h-full ${isIced ? c.blue : c.secondary}`}></div>
        <p className={`text-sm font-bold ${c.textDark} mb-5 flex items-center gap-2`}>{t('auto_calc_title')} <Droplets size={18} className={isIced ? c.blueText : c.secondaryText}/></p>
        <div className="flex items-center gap-6">
            <button onClick={() => setCustomWeight(Math.max(1, customWeight - 1))} className={`w-14 h-14 flex items-center justify-center rounded-full border-2 ${c.border} text-gray-500 hover:opacity-80 active:scale-95 text-2xl font-medium outline-none`}>-</button>
            <div className="relative flex items-baseline"><input type="number" value={customWeight || ''} onChange={(e) => setCustomWeight(Number(e.target.value))} className={`w-24 text-center text-6xl font-black ${c.textDark} bg-transparent focus:outline-none`} /><span className={`text-xl font-bold ${c.textMuted} ml-1`}>g</span></div>
            <button onClick={() => setCustomWeight(customWeight + 1)} className={`w-14 h-14 flex items-center justify-center rounded-full border-2 ${c.border} text-gray-500 hover:opacity-80 active:scale-95 text-2xl font-medium outline-none`}>+</button>
        </div>
    </div>

    {recipe.baseGrind && (
        <div className={`${c.card} rounded-2xl shadow-sm border ${c.border} overflow-hidden`}>
            <button onClick={() => setIsGrindOpen(!isGrindOpen)} className={`w-full flex items-center justify-between p-4 hover:bg-black/5 dark:hover:bg-white/5 transition-colors outline-none`}>
                <div className="flex items-center gap-3"><div className={`p-1.5 rounded-full ${c.infoBg} ${c.primaryText}`}><Settings2 size={16} /></div><span className={`text-sm font-bold ${c.textDark}`}>{t('suggest_grind_title')}</span></div>
                <div className="flex items-center gap-2">
                    {!isGrindOpen && (
                        <span className={`text-[11px] font-bold ${c.textMuted} bg-black/5 dark:bg-white/5 px-2 py-1 rounded-md max-w-[150px] truncate border ${c.border}`}>
                            {GRINDER_DATABASE[recipe.baseGrind.grinder].name}: <span className={c.primaryText}>{recipe.baseGrind.val}</span>
                        </span>
                    )}
                    <ChevronDown size={18} className={`${c.textMuted} transition-transform ${isGrindOpen ? 'rotate-180' : ''}`}/>
                </div>
            </button>
            {isGrindOpen && (
                <div className={`p-5 border-t ${c.border} ${c.bg}`}>
                    <div className="flex items-end justify-between mb-4">
                        <div><div className={`text-[10px] font-bold ${c.textMuted} uppercase tracking-wider mb-1`}>{t('base_grind')}</div><div className={`text-base font-black ${c.textDark}`}>{GRINDER_DATABASE[recipe.baseGrind.grinder].name}</div></div>
                        <div className={`text-2xl font-black ${c.primaryText}`}>{recipe.baseGrind.val}</div>
                    </div>
                    <div className={`h-px w-full ${c.border} mb-4`}></div>
                    <div className={`text-[10px] font-bold ${c.textMuted} uppercase tracking-wider mb-2`}>{t('my_grinder')}</div>
                    <select value={userGrinder} onChange={(e) => setUserGrinder(e.target.value)} className={`w-full ${c.inputBg} border ${c.border} p-3 rounded-xl font-bold text-sm ${userGrinder === '' ? 'text-gray-400' : c.textDark} mb-4 outline-none focus:ring-2 focus:ring-[#7E8D85] appearance-none`}>
                        <option value="" disabled>{t('select_grinder_placeholder')}</option>
                        {Object.entries(grindGroups).map(([gName, items]) => (<optgroup key={gName} label={gName} className={`${c.textMuted} font-bold`}>{items.map(item => (<option key={item.key} value={item.key} className={`${c.textDark} font-medium`}>{item.name}</option>))}</optgroup>))}
                    </select>
                    {userGrinder && (
                        <div className={`p-4 rounded-xl border ${c.border} ${c.card} flex items-center justify-between shadow-sm`}><span className={`text-sm font-bold ${c.textDark}`}>{t('converted_result')}</span>{convertedGrind?.error ? (<span className="text-red-500 font-bold text-sm">{convertedGrind.error}</span>) : (<div className="text-right"><span className={`text-2xl font-black ${c.secondaryText}`}>{convertedGrind?.valB}</span><span className={`text-xs font-bold ${c.textMuted} ml-1`}>{convertedGrind?.unit}</span></div>)}</div>
                    )}
                    
                    {/* 整合：實體比例顯微鏡，無縫接軌顯示目前建議的粗細度 */}
                    {baseCatIdx !== -1 && (
                        <div className="mt-2 -mx-2">
                            <GrindVisualizer catIdx={baseCatIdx} c={c} lang={lang} />
                        </div>
                    )}
                </div>
            )}
        </div>
    )}

    <div className={`${c.card} rounded-2xl shadow-sm border ${c.border} overflow-hidden`}>
        {recipe.description && (<div className={`p-5 text-[13px] sm:text-sm ${c.textDark} leading-relaxed ${c.infoBg} border-b ${c.border} whitespace-pre-wrap`}>{renderDynamicText(recipe.description)}</div>)}
        <div className={`p-4 grid grid-cols-3 gap-2 sm:gap-3 ${c.card}`}>
            <div className={`flex flex-col items-center justify-center gap-1.5 ${c.infoBg} p-3 rounded-xl border border-transparent`}><div className={`p-1.5 rounded-full ${c.iconBg} ${c.redText} shadow-sm mb-1`}><Thermometer size={16} /></div><p className={`text-[10px] uppercase font-bold tracking-wider ${c.textMuted}`}>{t('suggest_temp')}</p><p className={`font-bold text-base ${c.textDark}`}>{recipe.temperature}°C</p></div>
            <div className={`flex flex-col items-center justify-center gap-1.5 ${c.infoBg} p-3 rounded-xl border border-transparent`}><div className={`p-1.5 rounded-full ${c.iconBg} ${c.yellowText} shadow-sm mb-1`}><ScaleIcon size={16} /></div><p className={`text-[10px] uppercase font-bold tracking-wider ${c.textMuted}`}>{t('suggest_weight')}</p><p className={`font-bold text-base ${c.textDark}`}>{recipe.baseCoffee}g</p></div>
            <div className={`flex flex-col items-center justify-center gap-1.5 ${c.infoBg} p-3 rounded-xl border border-transparent`}><div className={`p-1.5 rounded-full ${c.iconBg} ${c.blueText} shadow-sm mb-1`}><Settings2 size={16} /></div><p className={`text-[10px] uppercase font-bold tracking-wider ${c.textMuted}`}>{t('base_ratio')}</p><p className={`font-bold text-base ${c.textDark}`}>1 : {baseRatio}</p></div>
        </div>
    </div>
    <div className={`sticky top-16 z-30 pt-4 pb-2 ${c.bg}`}>
        <div className={`${c.card} rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border ${c.border} p-4 flex items-center justify-between`}>
            <div className="flex items-center gap-3"><button onClick={() => setIsRunning(!isRunning)} className={`w-12 h-12 rounded-full flex items-center justify-center text-white ${isRunning ? c.red : c.primary} shadow-md active:scale-95 transition-all outline-none`}>{isRunning ? <Pause size={24}/> : <Play size={24} className="ml-1"/>}</button><button onClick={() => { setElapsed(0); setIsRunning(false); }} className={`w-10 h-10 rounded-full flex items-center justify-center ${c.iconBg} ${c.textMuted} border ${c.border} active:scale-95 transition-all outline-none`}><RotateCcw size={18}/></button></div>
            <div className="text-right"><div className={`text-[10px] font-bold ${c.textMuted} uppercase tracking-wider mb-0.5`}>{t('timer_title')}</div><div className={`font-mono text-4xl font-black ${isRunning ? c.primaryText : c.textDark} tracking-widest tabular-nums leading-none`}>{formatTime(elapsed)}</div></div>
        </div>
    </div>
    <div className={`${c.card} rounded-2xl shadow-sm border ${c.border} p-5 pb-6`}>
        <h3 className={`text-lg font-bold ${c.textDark} mb-6 flex items-center gap-2 pb-3 border-b ${c.border}`}><Clock size={20} className={c.primaryText}/> {t('brew_steps')}{ratio !== 1 && <span className={`ml-auto text-xs font-bold text-white ${c.secondary} px-2 py-1 rounded-md`}>{t('converted_ratio')} {(ratio * 100).toFixed(0)}%</span>}</h3>
        <div className={`relative border-l-2 ${c.border} ml-4 space-y-8 pb-4 mt-4`}>
            {recipe.steps.map((step, index) => {
                const scaledWater = step.water !== null ? Math.round(step.water * ratio) : null;
                const isTextTime = isNaN(parseInt(step.time.charAt(0))) || step.time.length > 5; const isActive = activeStepIndex === index; const isPast = activeStepIndex > index; const isUpcoming = activeStepIndex < index && activeStepIndex !== -1;
                return (
                    <div key={step.id || index} className={`relative pl-8 transition-all duration-500 ${isActive ? 'opacity-100 z-10' : (isPast ? 'opacity-30' : (isUpcoming ? 'opacity-50' : 'opacity-100'))}`}>
                        <div className={`absolute -left-[9px] ${isActive ? 'top-1/2 -translate-y-1/2' : 'top-3'} w-4 h-4 rounded-full border-2 ${c.card} ${isActive ? (isIced ? c.blue : c.yellow) + ' shadow-md scale-125' : (step.water ? (isIced ? c.blue : c.yellow) : c.secondary)} transition-all duration-500`}></div>
                        <div className={`flex justify-between items-center rounded-2xl transition-all duration-500 ${isActive ? `p-4 -ml-3 -mr-2 shadow-[0_4px_20px_rgba(0,0,0,0.06)] border-y border-r border-l-4 ${isIced ? c.activeIcedBorder : c.activeHotBorder} ${isIced ? c.activeIcedBg : c.activeHotBg} scale-[1.02]` : 'py-2 border border-transparent'}`}>
                            <div className="flex-1 pr-3"><div className="flex items-center flex-wrap gap-2 mb-1.5"><span className={`font-mono font-black ${isTextTime ? 'text-[0.95rem]' : 'text-[1.1rem]'} ${isActive ? (isIced ? c.blueText : c.yellowText) : c.textDark}`}>{step.time}</span>{step.action && <span className={`text-[11px] px-2 py-0.5 rounded-md ${isIced ? c.icedTag : c.hotTag} font-bold whitespace-nowrap`}>{step.action}</span>}</div><p className={`text-sm ${isActive ? c.activeText : c.textDark} leading-relaxed ${isActive ? 'font-bold' : 'font-medium'}`}>{renderDynamicText(step.note)}</p></div>
                            {scaledWater !== null && (<div className={`text-right shrink-0 px-4 py-2 rounded-xl border ${isActive ? `${c.card} border-transparent shadow-sm` : `${c.inputBg} ${c.border}`} min-w-[70px] transition-colors`}><div className={`text-2xl font-black ${isIced ? c.blueText : c.yellowText} leading-none`}>{scaledWater}<span className="text-sm font-bold ml-0.5 text-gray-500">g</span></div>{ratio !== 1 && <div className={`text-[10px] text-gray-400 mt-1 font-bold`}>({t('original_water')} {step.water}g)</div>}</div>)}
                        </div>
                    </div>
                );
            })}
        </div>
        {!showTroubleshoot ? (<button onClick={() => setShowTroubleshoot(true)} className={`w-full mt-6 p-4 rounded-2xl border-2 border-dashed ${c.border} ${c.inputBg} flex flex-col items-center justify-center gap-2 hover:opacity-80 transition-all group outline-none`}><Compass size={24} className={`${c.textMuted} group-hover:${c.primaryText} transition-colors`} /><span className={`text-sm font-bold ${c.textMuted} group-hover:${c.primaryText} transition-colors`}>{t('tweak_btn')}</span></button>) : (<Troubleshooter recipe={recipe} c={c} t={t} lang={lang} onClose={() => setShowTroubleshoot(false)} />)}
    </div>
</div>
);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
